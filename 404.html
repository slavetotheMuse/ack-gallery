<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — a.c.k. art</title>
  <meta name="description" content="nah">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #505050;
      --node-bg: #3a3a3a;
      --node-border: #666;
      --text: #ccc;
      --text-dim: #888;
      --accent: #e8c47c;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body {
      background: var(--bg);
      font-family: 'JetBrains Mono', monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }
    body::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.4) 100%);
      pointer-events: none;
    }
    .node {
      position: relative;
      z-index: 1;
      background: var(--node-bg);
      border: 1px solid var(--node-border);
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.05) inset;
      width: 320px;
      cursor: pointer;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      animation: nodeFloat 6s ease-in-out infinite;
    }
    .node:hover {
      transform: scale(1.02);
      box-shadow: 0 8px 40px rgba(0,0,0,0.6), 0 0 0 1px rgba(232,196,124,0.3);
    }
    @keyframes nodeFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    .node-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      background: rgba(0,0,0,0.25);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .node-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 14px;
      font-weight: 400;
      color: var(--text);
      letter-spacing: 0.5px;
    }
    .node-badge {
      font-size: 9px;
      color: var(--text-dim);
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .node-image { display: block; width: 100%; height: auto; }
    .four-oh-four {
      position: absolute;
      z-index: 2;
      top: -48px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'JetBrains Mono', monospace;
      font-size: 72px;
      font-weight: 500;
      color: var(--accent);
      letter-spacing: 8px;
      text-shadow: 0 2px 20px rgba(232,196,124,0.3);
      opacity: 0.85;
      user-select: none;
    }
    .connector {
      position: absolute;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--node-border);
      border: 1px solid rgba(255,255,255,0.15);
    }
    .connector.left { left: -4px; top: 50%; transform: translateY(-50%); }
    .connector.right { right: -4px; top: 50%; transform: translateY(-50%); }
    .noodle {
      position: absolute;
      z-index: 0;
      fill: none;
      stroke: var(--node-border);
      stroke-width: 1.5;
      opacity: 0.3;
    }
    .subtitle {
      padding: 10px 12px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 1px;
      text-align: center;
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    .home-link {
      position: absolute;
      z-index: 10;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text-dim);
      text-decoration: none;
      letter-spacing: 2px;
      transition: color 0.3s;
      padding: 8px 20px;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 4px;
    }
    .home-link:hover {
      color: var(--accent);
      border-color: rgba(232,196,124,0.3);
    }
    .scene { animation: fadeIn 1.2s ease-out; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <svg class="noodle" style="top:0;left:0;width:100%;height:100%;" viewBox="0 0 1400 900" preserveAspectRatio="none">
    <path d="M 0 350 C 200 350, 350 420, 490 420" />
    <path d="M 910 420 C 1050 420, 1200 300, 1400 300" />
    <path d="M 0 500 C 150 500, 300 460, 490 460" />
    <path d="M 910 460 C 1100 460, 1250 550, 1400 550" />
  </svg>
  <div class="scene">
    <div style="position:relative;display:inline-block;">
      <div class="four-oh-four">404</div>
      <div class="node" onclick="window.location.href='/'">
        <div class="connector left"></div>
        <div class="connector right"></div>
        <div class="node-header">
          <span class="node-title">nah</span>
          <span class="node-badge">1 of 1</span>
        </div>
        <img class="node-image" src="1of1s/web/nah_web.jpg" alt="nah" draggable="false">
        <div class="subtitle">page not found</div>
      </div>
    </div>
  </div>
  <a class="home-link" href="/">← enter gallery</a>
</body>
</html>
