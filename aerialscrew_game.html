<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>AERIAL SCREW — ack.art arcade</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      font-family: 'JetBrains Mono', monospace;
      background: #1e1c1a; color: #e0e0dc;
      overflow: hidden; user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
    }
    canvas {
      display: block; width: 100%; height: 100%;
      position: absolute; top: 0; left: 0;
    }
    #hud {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 10;
    }
    .hud-score {
      position: absolute; top: 20px;
      font-size: 11px; letter-spacing: 0.3em;
      color: rgba(220,150,50,0.5); text-transform: uppercase;
    }
    .hud-score .val {
      display: block; font-size: 22px; color: rgba(220,150,50,0.9);
      letter-spacing: 0.05em; margin-top: 2px;
    }
    #coinScore { left: 20px; }
    #bestScore { right: 20px; text-align: right; }
    #overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: rgba(10,9,8,0.85); z-index: 20;
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      pointer-events: auto; cursor: pointer;
      text-align: center; padding: 40px;
    }
    #overlay.hidden { display: none; }
    #overlay .title {
      font-family: 'EB Garamond', Georgia, serif;
      font-size: clamp(28px, 6vw, 44px); font-weight: 400;
      color: rgba(225,215,195,0.8); letter-spacing: 0.03em;
      line-height: 1.4;
    }
    #overlay .sub {
      font-size: 11px; letter-spacing: 0.25em;
      color: rgba(200,180,150,0.35); margin-top: 28px;
      text-transform: uppercase;
    }
    #overlay .prompt {
      font-size: 12px; letter-spacing: 0.35em;
      color: rgba(220,150,50,0.5); margin-top: 40px;
      animation: pulse 2.5s ease-in-out infinite;
    }
    #overlay .final-score {
      font-size: 14px; letter-spacing: 0.15em;
      color: rgba(220,150,50,0.7); margin-top: 20px;
    }
    @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>
  <div id="hud">
    <div class="hud-score" id="coinScore">coins<span class="val" id="coinVal">0</span></div>
    <div class="hud-score" id="bestScore">best<span class="val" id="bestVal">0</span></div>
  </div>
  <div id="overlay">
    <div class="title">aerial screw</div>
    <div class="sub">ack.art arcade</div>
    <div class="prompt">tap to fly</div>
  </div>

<script>
(function() {
  'use strict';

  // ── CONSTANTS ──
  var SPRITE_FRAMES = 10;
  var SPRITE_FW = 500;    // each frame in the 5000x1070 sprite sheet
  var SPRITE_FH = 1070;
  var GRAVITY = 0.45;
  var JUMP_FORCE = -8;
  var SCROLL_SPEED = 3;
  var COIN_SPAWN_DIST = 280;
  var OBSTACLE_SPAWN_DIST = 450;
  var GAP_MIN = 180;
  var GAP_MAX = 260;
  var SCREW_W = 60;
  var SCREW_H = Math.round(SCREW_W * (SPRITE_FH / SPRITE_FW));
  var COIN_R = 18;

  // ── STATE ──
  var canvas, ctx, W, H;
  var state = 'start'; // start | playing | dead
  var score = 0, best = 0;
  var frameCount = 0;

  // Screw (player)
  var screw = { x: 0, y: 0, vy: 0, frame: 0, animTimer: 0, rotation: 0 };

  // World
  var coins = [];
  var obstacles = [];
  var particles = [];
  var scrollX = 0;
  var nextCoinX = 0;
  var nextObsX = 0;
  var difficulty = 1;

  // Assets
  var spriteImg = new Image();
  var coinFaceImg = new Image();
  var coinBackImg = new Image();
  var assetsLoaded = 0;
  var totalAssets = 3;

  // ── INIT ──
  function init() {
    canvas = document.getElementById('gameCanvas');
    ctx = canvas.getContext('2d');
    resize();
    window.addEventListener('resize', resize);

    // Input — accept clicks, touches, and spacebar
    document.addEventListener('click', onInput);
    document.addEventListener('touchstart', function(e) { e.preventDefault(); }, { passive: false });
    document.addEventListener('touchend', function(e) { e.preventDefault(); onInput(e); }, { passive: false });
    document.addEventListener('keydown', function(e) { if (e.code === 'Space') { e.preventDefault(); onInput(e); } });

    // Load assets
    spriteImg.onload = coinFaceImg.onload = coinBackImg.onload = function() {
      assetsLoaded++;
      if (assetsLoaded >= totalAssets) console.log('[ACK] All game assets loaded');
    };
    spriteImg.onerror = function() { console.warn('[ACK] Sprite sheet failed to load'); };
    spriteImg.src = 'aerialscrew_sprite.png';
    coinFaceImg.src = 'servant_face_web.png';
    coinBackImg.src = 'servant_back_web.png';

    // Initial screw position
    screw.x = W * 0.18;
    screw.y = H * 0.45;

    // Load best score
    try { best = parseInt(localStorage.getItem('ack_screw_best')) || 0; } catch(e) {}
    document.getElementById('bestVal').textContent = best;

    requestAnimationFrame(loop);
  }

  function resize() {
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W;
    canvas.height = H;
    screw.x = W * 0.18;
  }

  // ── INPUT ──
  function onInput() {
    if (state === 'start') {
      startGame();
    } else if (state === 'playing') {
      flap();
    } else if (state === 'dead') {
      resetGame();
    }
  }

  function flap() {
    screw.vy = JUMP_FORCE;
    for (var i = 0; i < 4; i++) {
      particles.push({
        x: screw.x, y: screw.y + SCREW_H * 0.4,
        vx: -1 - Math.random() * 2, vy: 1 + Math.random() * 2,
        life: 20 + Math.random() * 15, maxLife: 35,
        r: 2 + Math.random() * 2
      });
    }
  }

  function startGame() {
    state = 'playing';
    score = 0;
    scrollX = 0;
    frameCount = 0;
    screw.y = H * 0.45;
    screw.vy = JUMP_FORCE * 0.6;
    screw.frame = 0;
    coins = [];
    obstacles = [];
    particles = [];
    difficulty = 1;
    nextCoinX = W + 200;
    nextObsX = W + 500;
    document.getElementById('coinVal').textContent = '0';
    document.getElementById('overlay').classList.add('hidden');
  }

  function resetGame() {
    state = 'start';
    screw.y = H * 0.45;
    screw.vy = 0;
    screw.rotation = 0;
    scrollX = 0;
    coins = [];
    obstacles = [];
    particles = [];
    var overlay = document.getElementById('overlay');
    overlay.innerHTML =
      '<div class="title">aerial screw</div>' +
      '<div class="sub">ack.art arcade</div>' +
      '<div class="prompt">tap to fly</div>';
    overlay.classList.remove('hidden');
  }

  function die() {
    state = 'dead';
    if (score > best) {
      best = score;
      try { localStorage.setItem('ack_screw_best', best); } catch(e) {}
      document.getElementById('bestVal').textContent = best;
    }
    for (var i = 0; i < 20; i++) {
      var angle = Math.random() * Math.PI * 2;
      var speed = 2 + Math.random() * 4;
      particles.push({
        x: screw.x, y: screw.y,
        vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
        life: 30 + Math.random() * 20, maxLife: 50,
        r: 2 + Math.random() * 3
      });
    }
    setTimeout(function() {
      if (state !== 'dead') return;
      var overlay = document.getElementById('overlay');
      overlay.innerHTML =
        '<div class="title">transmission lost</div>' +
        '<div class="final-score">' + score + ' coins collected</div>' +
        '<div class="prompt">tap to retry</div>';
      overlay.classList.remove('hidden');
    }, 600);
  }

  // ── SPAWNING ──
  function spawnCoin(x) {
    coins.push({
      x: x,
      y: 60 + Math.random() * (H - 120),
      r: COIN_R,
      spin: Math.random() * Math.PI * 2,
      collected: false,
      collectAnim: 0
    });
  }

  function spawnObstacle(x) {
    var gapH = GAP_MIN + Math.random() * (GAP_MAX - GAP_MIN);
    gapH = Math.max(gapH - difficulty * 5, 140);
    var gapY = 80 + Math.random() * (H - gapH - 160);
    obstacles.push({ x: x, gapY: gapY, gapH: gapH, w: 40, scored: false });
  }

  // ── UPDATE ──
  function update() {
    if (state !== 'playing') return;
    frameCount++;

    difficulty = 1 + score * 0.05;
    var speed = SCROLL_SPEED + difficulty * 0.3;

    // Physics
    screw.vy += GRAVITY;
    screw.y += screw.vy;
    screw.rotation = Math.min(Math.max(screw.vy * 3, -30), 60);

    // Animate sprite
    screw.animTimer++;
    if (screw.animTimer >= 4) {
      screw.animTimer = 0;
      screw.frame = (screw.frame + 1) % SPRITE_FRAMES;
    }

    scrollX += speed;

    // Spawn
    while (nextCoinX < scrollX + W + 200) {
      spawnCoin(nextCoinX);
      nextCoinX += COIN_SPAWN_DIST - difficulty * 5 + Math.random() * 100;
    }
    while (nextObsX < scrollX + W + 200) {
      spawnObstacle(nextObsX);
      nextObsX += OBSTACLE_SPAWN_DIST + Math.random() * 100;
    }

    // Coins
    for (var i = coins.length - 1; i >= 0; i--) {
      var c = coins[i];
      c.spin += 0.06;
      if (c.collected) {
        c.collectAnim++;
        if (c.collectAnim > 20) { coins.splice(i, 1); continue; }
      }
      if (c.x - scrollX < -50) { coins.splice(i, 1); continue; }
      if (!c.collected) {
        var dx = (c.x - scrollX) - screw.x;
        var dy = c.y - screw.y;
        if (Math.sqrt(dx * dx + dy * dy) < c.r + SCREW_W * 0.35) {
          c.collected = true;
          score++;
          document.getElementById('coinVal').textContent = score;
          for (var p = 0; p < 6; p++) {
            particles.push({
              x: c.x - scrollX, y: c.y,
              vx: (Math.random() - 0.5) * 4, vy: (Math.random() - 0.5) * 4,
              life: 15 + Math.random() * 10, maxLife: 25,
              r: 2 + Math.random() * 2, gold: true
            });
          }
        }
      }
    }

    // Obstacles
    for (var j = obstacles.length - 1; j >= 0; j--) {
      var obs = obstacles[j];
      if (obs.x - scrollX < -60) { obstacles.splice(j, 1); continue; }
      var ox = obs.x - scrollX;
      var sL = screw.x - SCREW_W * 0.3;
      var sR = screw.x + SCREW_W * 0.3;
      var sT = screw.y - SCREW_H * 0.35;
      var sB = screw.y + SCREW_H * 0.35;
      if (sR > ox && sL < ox + obs.w) {
        if (sT < obs.gapY || sB > obs.gapY + obs.gapH) {
          die(); return;
        }
      }
    }

    // Bounds
    if (screw.y > H - 20 || screw.y < 10) { die(); return; }

    // Particles
    for (var k = particles.length - 1; k >= 0; k--) {
      var pt = particles[k];
      pt.x += pt.vx; pt.y += pt.vy; pt.life--;
      if (pt.life <= 0) particles.splice(k, 1);
    }
  }

  // ── DRAW ──
  function draw() {
    ctx.clearRect(0, 0, W, H);

    // Grid (parallax)
    ctx.strokeStyle = 'rgba(220,150,50,0.06)';
    ctx.lineWidth = 1;
    var gs = 50;
    var offX = -(scrollX * 0.3) % gs;
    for (var gx = offX; gx < W; gx += gs) {
      ctx.beginPath(); ctx.moveTo(gx, 0); ctx.lineTo(gx, H); ctx.stroke();
    }
    for (var gy = 0; gy < H; gy += gs) {
      ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(W, gy); ctx.stroke();
    }

    // Floor / ceiling
    ctx.strokeStyle = 'rgba(220,150,50,0.15)';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(0, H - 15); ctx.lineTo(W, H - 15); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, 8); ctx.lineTo(W, 8); ctx.stroke();

    // Obstacles
    for (var j = 0; j < obstacles.length; j++) {
      var obs = obstacles[j];
      var ox = obs.x - scrollX;
      if (ox < -60 || ox > W + 60) continue;

      // Top pillar
      ctx.fillStyle = 'rgba(60,55,48,0.9)';
      ctx.fillRect(ox, 0, obs.w, obs.gapY);
      ctx.strokeStyle = 'rgba(220,150,50,0.3)';
      ctx.lineWidth = 1.5;
      ctx.strokeRect(ox, 0, obs.w, obs.gapY);
      ctx.strokeStyle = 'rgba(220,150,50,0.08)';
      for (var ny = 20; ny < obs.gapY; ny += 30) {
        ctx.beginPath(); ctx.moveTo(ox + 5, ny); ctx.lineTo(ox + obs.w - 5, ny); ctx.stroke();
      }

      // Bottom pillar
      var botY = obs.gapY + obs.gapH;
      ctx.fillStyle = 'rgba(60,55,48,0.9)';
      ctx.fillRect(ox, botY, obs.w, H - botY);
      ctx.strokeStyle = 'rgba(220,150,50,0.3)';
      ctx.strokeRect(ox, botY, obs.w, H - botY);
      ctx.strokeStyle = 'rgba(220,150,50,0.08)';
      for (var ny2 = botY + 20; ny2 < H; ny2 += 30) {
        ctx.beginPath(); ctx.moveTo(ox + 5, ny2); ctx.lineTo(ox + obs.w - 5, ny2); ctx.stroke();
      }

      // Gap arrows
      ctx.fillStyle = 'rgba(220,150,50,0.2)';
      ctx.beginPath();
      ctx.moveTo(ox + obs.w / 2, obs.gapY + 4);
      ctx.lineTo(ox + obs.w / 2 - 6, obs.gapY + 12);
      ctx.lineTo(ox + obs.w / 2 + 6, obs.gapY + 12);
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(ox + obs.w / 2, botY - 4);
      ctx.lineTo(ox + obs.w / 2 - 6, botY - 12);
      ctx.lineTo(ox + obs.w / 2 + 6, botY - 12);
      ctx.fill();
    }

    // Coins
    for (var i = 0; i < coins.length; i++) {
      var c = coins[i];
      var cx = c.x - scrollX;
      if (cx < -30 || cx > W + 30) continue;

      if (c.collected) {
        var alpha = 1 - c.collectAnim / 20;
        var scale = 1 + c.collectAnim * 0.05;
        ctx.globalAlpha = alpha;
        ctx.save();
        ctx.translate(cx, c.y - c.collectAnim * 1.5);
        ctx.scale(scale, scale);
        drawCoin(0, 0, c.r, c.spin);
        ctx.restore();
        ctx.globalAlpha = 1;
      } else {
        var bobY = c.y + Math.sin(frameCount * 0.04 + c.spin) * 4;
        drawCoin(cx, bobY, c.r, c.spin);
        // Glow
        ctx.save();
        ctx.globalAlpha = 0.12;
        ctx.beginPath();
        ctx.arc(cx, bobY, c.r + 6, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(220,150,50,0.4)';
        ctx.fill();
        ctx.restore();
      }
    }

    // Particles
    for (var k = 0; k < particles.length; k++) {
      var pt = particles[k];
      var a = pt.life / pt.maxLife;
      ctx.globalAlpha = a;
      ctx.fillStyle = pt.gold ? 'rgba(220,150,50,0.8)' : 'rgba(200,180,150,0.6)';
      ctx.beginPath();
      ctx.arc(pt.x, pt.y, pt.r * a, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    // Player
    if (state !== 'dead' || frameCount % 4 < 2) {
      drawScrew();
    }
  }

  function drawScrew() {
    ctx.save();
    ctx.translate(screw.x, screw.y);
    ctx.rotate(screw.rotation * Math.PI / 180);

    if (spriteImg.complete && spriteImg.naturalWidth > 0) {
      ctx.drawImage(
        spriteImg,
        screw.frame * SPRITE_FW, 0, SPRITE_FW, SPRITE_FH,
        -SCREW_W / 2, -SCREW_H / 2, SCREW_W, SCREW_H
      );
    } else {
      // Fallback
      ctx.fillStyle = 'rgba(200,180,150,0.8)';
      ctx.fillRect(-SCREW_W / 2, -SCREW_H / 4, SCREW_W, SCREW_H / 2);
      ctx.fillStyle = 'rgba(220,150,50,0.6)';
      ctx.beginPath();
      ctx.moveTo(0, -SCREW_H / 2);
      ctx.lineTo(-SCREW_W / 3, -SCREW_H / 4);
      ctx.lineTo(SCREW_W / 3, -SCREW_H / 4);
      ctx.fill();
    }
    ctx.restore();
  }

  function drawCoin(x, y, r, spin) {
    var scaleX = Math.cos(spin);
    var img = scaleX > 0 ? coinFaceImg : coinBackImg;
    var absScale = Math.abs(scaleX);

    ctx.save();
    ctx.translate(x, y);
    ctx.scale(absScale || 0.01, 1);

    if (img.complete && img.naturalWidth > 0) {
      // Circular clip
      ctx.beginPath();
      ctx.arc(0, 0, r, 0, Math.PI * 2);
      ctx.closePath();
      ctx.clip();
      ctx.drawImage(img, -r, -r, r * 2, r * 2);
    } else {
      ctx.fillStyle = 'rgba(220,150,50,0.7)';
      ctx.beginPath();
      ctx.arc(0, 0, r, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();

    // Rim
    ctx.save();
    ctx.translate(x, y);
    ctx.scale(absScale || 0.01, 1);
    ctx.strokeStyle = 'rgba(220,150,50,0.3)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  }

  // ── GAME LOOP ──
  function loop() {
    update();
    draw();

    // Idle hover on start/dead screens
    if (state === 'start' || state === 'dead') {
      screw.animTimer++;
      if (screw.animTimer >= 6) {
        screw.animTimer = 0;
        screw.frame = (screw.frame + 1) % SPRITE_FRAMES;
      }
      if (state === 'start') {
        screw.y = H * 0.45 + Math.sin(Date.now() * 0.002) * 15;
      }
    }

    requestAnimationFrame(loop);
  }

  // ── BOOT ──
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }

})();
</script>
</body>
</html>
