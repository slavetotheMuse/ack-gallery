<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grid Depth Test — a.c.k. art</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a1a;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
      font-family: 'JetBrains Mono', monospace;
    }

    canvas#gridCanvas {
      position: fixed;
      top: 0; left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 0;
    }

    /* ── Fog overlays — soft depth fade ── */
    .fog-radial {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      z-index: 1;
      pointer-events: none;
      background: radial-gradient(ellipse at 50% 50%, transparent 30%, rgba(26,26,26,0.25) 60%, rgba(26,26,26,0.7) 100%);
      opacity: 0.6;
    }
    .fog-bottom {
      position: fixed;
      bottom: 0; left: 0; width: 100%; height: 22%;
      z-index: 1;
      pointer-events: none;
      background: linear-gradient(to top, rgba(26,26,26,0.6) 0%, transparent 100%);
    }
    .fog-top {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 15%;
      z-index: 1;
      pointer-events: none;
      background: linear-gradient(to bottom, rgba(26,26,26,0.4) 0%, transparent 100%);
    }

    /* ── Test controls ── */
    .controls {
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 100;
      background: rgba(20,22,30,0.92);
      border: 1px solid rgba(100,140,200,0.2);
      border-radius: 4px;
      padding: 14px 18px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      font-size: 0.55rem;
      backdrop-filter: blur(8px);
    }
    .controls .title {
      font-size: 0.5rem;
      letter-spacing: 0.2em;
      color: rgba(220,150,50,0.6);
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .controls label {
      display: flex;
      align-items: center;
      gap: 8px;
      color: rgba(200,195,185,0.5);
    }
    .controls input[type="range"] {
      width: 110px;
      accent-color: rgba(220,150,50,0.7);
    }
    .controls .val {
      color: rgba(220,150,50,0.6);
      min-width: 40px;
      text-align: right;
    }
    .controls .section {
      border-top: 1px solid rgba(100,140,200,0.1);
      padding-top: 8px;
      margin-top: 2px;
    }
  </style>
</head>
<body>

  <canvas id="gridCanvas"></canvas>

  <div class="fog-radial" id="fogRadial"></div>
  <div class="fog-bottom" id="fogBottom"></div>
  <div class="fog-top" id="fogTop"></div>

  <div class="controls">
    <div class="title">Grid Depth Controls</div>

    <label>
      Perspective tilt
      <input type="range" id="tilt" min="0" max="50" value="0" step="1">
      <span class="val" id="tiltVal">0°</span>
    </label>
    <label>
      Orange accent lines
      <input type="range" id="orangeAlpha" min="0" max="30" value="8" step="1">
      <span class="val" id="orangeAlphaVal">0.08</span>
    </label>
    <label>
      Orange line spacing
      <input type="range" id="orangeEvery" min="2" max="10" value="5" step="1">
      <span class="val" id="orangeEveryVal">5</span>
    </label>
    <label>
      Grid glow strength
      <input type="range" id="glowStr" min="0" max="20" value="6" step="1">
      <span class="val" id="glowStrVal">0.06</span>
    </label>

    <div class="section"></div>

    <label>
      Vortex strength
      <input type="range" id="vortexStr" min="0" max="30" value="10" step="1">
      <span class="val" id="vortexStrVal">1.0</span>
    </label>
    <label>
      Vortex radius
      <input type="range" id="vortexR" min="50" max="500" value="220" step="10">
      <span class="val" id="vortexRVal">220</span>
    </label>

    <div class="section"></div>

    <label>
      Fog opacity
      <input type="range" id="fogOp" min="0" max="100" value="60" step="5">
      <span class="val" id="fogOpVal">0.6</span>
    </label>
    <label>
      Bottom fog
      <input type="range" id="fogBotH" min="0" max="50" value="22" step="2">
      <span class="val" id="fogBotHVal">22%</span>
    </label>
    <label>
      Depth particles
      <input type="range" id="particleCount" min="0" max="60" value="15" step="5">
      <span class="val" id="particleCountVal">15</span>
    </label>

    <div class="section"></div>

    <label>
      Horizon glow
      <input type="range" id="horizGlow" min="0" max="30" value="8" step="1">
      <span class="val" id="horizGlowVal">0.08</span>
    </label>
    <label>
      Grid breathing
      <input type="range" id="breathe" min="0" max="20" value="5" step="1">
      <span class="val" id="breatheVal">0.005</span>
    </label>
  </div>

  <script>
    const canvas = document.getElementById('gridCanvas');
    const dpr = window.devicePixelRatio || 1;
    let W = window.innerWidth;
    let H = window.innerHeight;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);

    // ── Parameters (controlled by sliders) ──
    let params = {
      tilt: 0,
      orangeAlpha: 0.08,
      orangeEvery: 5,
      glowStr: 0.06,
      vortexStr: 1.0,
      vortexR: 220,
      fogOp: 0.6,
      fogBotH: 22,
      particleCount: 15,
      horizGlow: 0.08,
      breatheStr: 0.005,
    };

    // ── Grid intersection points ──
    const spacing = 35;
    const majorEvery = 5;
    let cx = W / 2;
    let cy = H / 2;
    let intersections = [];
    let floatingParticles = [];

    function buildGrid() {
      W = window.innerWidth;
      H = window.innerHeight;
      canvas.width = W * dpr;
      canvas.height = H * dpr;
      canvas.style.width = W + 'px';
      canvas.style.height = H + 'px';
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      ctx.scale(dpr, dpr);
      cx = W / 2;
      cy = H / 2;

      intersections = [];
      const iStart = -Math.ceil(cx / spacing) - 2;
      const jStart = -Math.ceil(cy / spacing) - 2;
      for (let i = iStart; cx + i * spacing < W + spacing * 2; i++) {
        for (let j = jStart; cy + j * spacing < H + spacing * 2; j++) {
          const x = cx + i * spacing;
          const y = cy + j * spacing;
          intersections.push({ x, y, ox: x, oy: y, ix: i, iy: j });
        }
      }

      // Floating depth particles
      floatingParticles = [];
      for (let p = 0; p < 60; p++) {
        floatingParticles.push({
          x: Math.random() * W,
          y: Math.random() * H,
          vx: (Math.random() - 0.5) * 0.15,
          vy: (Math.random() - 0.5) * 0.12 - 0.05,
          size: 0.5 + Math.random() * 2,
          alpha: 0.04 + Math.random() * 0.08,
          phase: Math.random() * Math.PI * 2,
          isOrange: Math.random() < 0.3, // 30% orange tint
        });
      }
    }
    buildGrid();

    // ── Draw loop ──
    const startTime = performance.now();

    function draw() {
      const time = (performance.now() - startTime) / 1000;
      ctx.clearRect(0, 0, W, H);

      const breathe = Math.sin(time * 0.4) * params.breatheStr;
      const pulse = 1 + Math.sin(time * 0.8) * 0.05;
      const rSq = params.vortexR * params.vortexR;

      // ── Apply perspective tilt via Y-scale gradient (fake 3D) ──
      const tiltAmount = params.tilt / 100;

      // ── Vortex warp ──
      for (const pt of intersections) {
        const dx = pt.ox - cx;
        const dy = pt.oy - cy;
        const dSq = dx * dx + dy * dy;

        // Perspective tilt: compress Y toward top, expand toward bottom
        let perspY = pt.oy;
        if (tiltAmount > 0) {
          const yNorm = (pt.oy - cy) / (H / 2); // -1 top, +1 bottom
          const yScale = 1 + tiltAmount * yNorm * 0.5;
          perspY = cy + (pt.oy - cy) * yScale;
        }

        if (dSq < rSq && dSq > 1) {
          const dist = Math.sqrt(dSq);
          const norm = dist / params.vortexR;
          const pull = Math.pow(1 - norm, 1.6) * params.vortexStr * pulse;
          const angle = Math.atan2(dy, dx);
          const twist = pull * 0.4 * (1 - norm);
          pt.x = pt.ox + (cx - pt.ox) * pull * 0.3 + (-Math.sin(angle) * twist * dist * 0.1);
          pt.y = perspY + (cy - perspY) * pull * 0.3 + (Math.cos(angle) * twist * dist * 0.1);
        } else {
          pt.x = pt.ox;
          pt.y = perspY;
        }
      }

      // Group by grid coords
      const vertLines = new Map();
      const horizLines = new Map();
      for (const pt of intersections) {
        const kx = Math.round(pt.ox);
        const ky = Math.round(pt.oy);
        if (!vertLines.has(kx)) vertLines.set(kx, []);
        vertLines.get(kx).push(pt);
        if (!horizLines.has(ky)) horizLines.set(ky, []);
        horizLines.get(ky).push(pt);
      }
      vertLines.forEach(pts => pts.sort((a, b) => a.oy - b.oy));
      horizLines.forEach(pts => pts.sort((a, b) => a.ox - b.ox));

      // ── Draw minor grid lines (white, very faint) ──
      ctx.strokeStyle = `rgba(255,255,255,${0.03 + breathe})`;
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      vertLines.forEach((pts, kx) => {
        const idx = Math.round((kx - cx) / spacing);
        if (idx % majorEvery === 0) return;
        if (pts.length < 2) return;
        ctx.moveTo(pts[0].x, pts[0].y);
        for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
      });
      horizLines.forEach((pts, ky) => {
        const idx = Math.round((ky - cy) / spacing);
        if (idx % majorEvery === 0) return;
        if (pts.length < 2) return;
        ctx.moveTo(pts[0].x, pts[0].y);
        for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
      });
      ctx.stroke();

      // ── Major grid lines (white, slightly brighter) ──
      ctx.strokeStyle = `rgba(255,255,255,${0.06 + breathe})`;
      ctx.lineWidth = 0.75;
      ctx.beginPath();
      vertLines.forEach((pts, kx) => {
        const idx = Math.round((kx - cx) / spacing);
        if (idx % majorEvery !== 0 || idx === 0) return;
        if (pts.length < 2) return;
        ctx.moveTo(pts[0].x, pts[0].y);
        for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
      });
      horizLines.forEach((pts, ky) => {
        const idx = Math.round((ky - cy) / spacing);
        if (idx % majorEvery !== 0 || idx === 0) return;
        if (pts.length < 2) return;
        ctx.moveTo(pts[0].x, pts[0].y);
        for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
      });
      ctx.stroke();

      // ── Orange accent lines — every Nth major line gets a warm glow ──
      if (params.orangeAlpha > 0) {
        const oEvery = params.orangeEvery;
        ctx.lineWidth = 0.8;

        // Vertical orange accents
        ctx.strokeStyle = `rgba(220,150,50,${params.orangeAlpha})`;
        ctx.beginPath();
        vertLines.forEach((pts, kx) => {
          const idx = Math.round((kx - cx) / spacing);
          if (idx === 0) return;
          if (Math.abs(idx) % (majorEvery * oEvery) !== 0) return;
          if (pts.length < 2) return;
          ctx.moveTo(pts[0].x, pts[0].y);
          for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
        });
        ctx.stroke();

        // Horizontal orange accents
        ctx.beginPath();
        horizLines.forEach((pts, ky) => {
          const idx = Math.round((ky - cy) / spacing);
          if (idx === 0) return;
          if (Math.abs(idx) % (majorEvery * oEvery) !== 0) return;
          if (pts.length < 2) return;
          ctx.moveTo(pts[0].x, pts[0].y);
          for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
        });
        ctx.stroke();

        // Orange glow bloom on those lines (thicker, more transparent)
        if (params.glowStr > 0) {
          ctx.lineWidth = 4;
          ctx.strokeStyle = `rgba(220,150,50,${params.glowStr * 0.4})`;
          ctx.beginPath();
          vertLines.forEach((pts, kx) => {
            const idx = Math.round((kx - cx) / spacing);
            if (idx === 0) return;
            if (Math.abs(idx) % (majorEvery * oEvery) !== 0) return;
            if (pts.length < 2) return;
            ctx.moveTo(pts[0].x, pts[0].y);
            for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
          });
          horizLines.forEach((pts, ky) => {
            const idx = Math.round((ky - cy) / spacing);
            if (idx === 0) return;
            if (Math.abs(idx) % (majorEvery * oEvery) !== 0) return;
            if (pts.length < 2) return;
            ctx.moveTo(pts[0].x, pts[0].y);
            for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
          });
          ctx.stroke();
        }
      }

      // ── Center crosshairs ──
      ctx.strokeStyle = 'rgba(100,200,150,0.08)';
      ctx.lineWidth = 0.75;
      const centerV = [];
      vertLines.forEach((pts, kx) => { if (Math.abs(kx - cx) < 1) centerV.push(...pts); });
      if (centerV.length > 1) {
        centerV.sort((a, b) => a.oy - b.oy);
        ctx.beginPath();
        ctx.moveTo(centerV[0].x, centerV[0].y);
        for (let i = 1; i < centerV.length; i++) ctx.lineTo(centerV[i].x, centerV[i].y);
        ctx.stroke();
      }
      ctx.strokeStyle = 'rgba(200,80,80,0.08)';
      const centerH = [];
      horizLines.forEach((pts, ky) => { if (Math.abs(ky - cy) < 1) centerH.push(...pts); });
      if (centerH.length > 1) {
        centerH.sort((a, b) => a.ox - b.ox);
        ctx.beginPath();
        ctx.moveTo(centerH[0].x, centerH[0].y);
        for (let i = 1; i < centerH.length; i++) ctx.lineTo(centerH[i].x, centerH[i].y);
        ctx.stroke();
      }

      // ── Intersection dots at orange line crossings ──
      if (params.orangeAlpha > 0) {
        const oEvery = params.orangeEvery;
        ctx.fillStyle = `rgba(220,160,60,${params.orangeAlpha * 1.5})`;
        for (const pt of intersections) {
          const ix = Math.round((pt.ox - cx) / spacing);
          const iy = Math.round((pt.oy - cy) / spacing);
          const isOrangeV = ix !== 0 && Math.abs(ix) % (majorEvery * oEvery) === 0;
          const isOrangeH = iy !== 0 && Math.abs(iy) % (majorEvery * oEvery) === 0;
          if (isOrangeV && isOrangeH) {
            ctx.beginPath();
            ctx.arc(pt.x, pt.y, 2, 0, Math.PI * 2);
            ctx.fill();
            // Glow dot
            ctx.fillStyle = `rgba(220,160,60,${params.orangeAlpha * 0.5})`;
            ctx.beginPath();
            ctx.arc(pt.x, pt.y, 5, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = `rgba(220,160,60,${params.orangeAlpha * 1.5})`;
          }
        }
      }

      // ── Horizon glow — warm light pooling at center ──
      if (params.horizGlow > 0) {
        const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.max(W, H) * 0.45);
        grad.addColorStop(0, `rgba(220,160,60,${params.horizGlow})`);
        grad.addColorStop(0.3, `rgba(220,140,40,${params.horizGlow * 0.3})`);
        grad.addColorStop(1, 'rgba(220,140,40,0)');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, W, H);
      }

      // ── Floating depth particles ──
      const pCount = Math.min(params.particleCount, floatingParticles.length);
      for (let p = 0; p < pCount; p++) {
        const pt = floatingParticles[p];
        pt.x += pt.vx;
        pt.y += pt.vy + Math.sin(time * 0.5 + pt.phase) * 0.03;
        if (pt.y < -10) { pt.y = H + 10; pt.x = Math.random() * W; }
        if (pt.x < -10) pt.x = W + 10;
        if (pt.x > W + 10) pt.x = -10;

        const flicker = 0.7 + Math.sin(time * 2 + pt.phase) * 0.3;
        const a = pt.alpha * flicker;

        if (pt.isOrange) {
          ctx.fillStyle = `rgba(220,165,70,${a})`;
        } else {
          ctx.fillStyle = `rgba(255,255,255,${a * 0.6})`;
        }
        ctx.beginPath();
        ctx.arc(pt.x, pt.y, pt.size, 0, Math.PI * 2);
        ctx.fill();
      }

      requestAnimationFrame(draw);
    }
    requestAnimationFrame(draw);

    // ── Wire up controls ──
    function wire(id, key, transform, display) {
      document.getElementById(id).oninput = function() {
        params[key] = transform(parseFloat(this.value));
        document.getElementById(id + 'Val').textContent = display(params[key]);
      };
    }
    wire('tilt', 'tilt', v => v, v => v + '°');
    wire('orangeAlpha', 'orangeAlpha', v => v / 100, v => v.toFixed(2));
    wire('orangeEvery', 'orangeEvery', v => v, v => v.toString());
    wire('glowStr', 'glowStr', v => v / 100, v => v.toFixed(2));
    wire('vortexStr', 'vortexStr', v => v / 10, v => v.toFixed(1));
    wire('vortexR', 'vortexR', v => v, v => v.toString());
    wire('fogOp', 'fogOp', v => v / 100, v => v.toFixed(2));
    wire('fogBotH', 'fogBotH', v => v, v => v + '%');
    wire('particleCount', 'particleCount', v => v, v => v.toString());
    wire('horizGlow', 'horizGlow', v => v / 100, v => v.toFixed(2));
    wire('breathe', 'breatheStr', v => v / 1000, v => v.toFixed(3));

    // Update fog CSS from slider
    document.getElementById('fogOp').oninput = function() {
      params.fogOp = parseFloat(this.value) / 100;
      document.getElementById('fogOpVal').textContent = params.fogOp.toFixed(2);
      document.getElementById('fogRadial').style.opacity = params.fogOp;
    };
    document.getElementById('fogBotH').oninput = function() {
      params.fogBotH = parseFloat(this.value);
      document.getElementById('fogBotHVal').textContent = params.fogBotH + '%';
      document.getElementById('fogBottom').style.height = params.fogBotH + '%';
    };

    window.addEventListener('resize', buildGrid);
  </script>
</body>
</html>
