<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Balloon Bags</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a1e;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    font-family: 'Cormorant Garamond', serif;
    cursor: default;
    user-select: none;
  }

  /* ── Balloon + bag unit ── */
  .balloon-unit { position: absolute; pointer-events: none; z-index: 100; }
  .balloon-hitbox { position: absolute; pointer-events: all; cursor: crosshair; }
  .balloon-svg {
    display: block;
    filter: drop-shadow(0 2px 6px rgba(0,0,0,0.3));
    transition: filter 0.2s ease;
  }
  .balloon-hitbox:hover .balloon-svg {
    filter: drop-shadow(0 2px 10px rgba(255,255,255,0.12));
  }
  .balloon-string {
    position: absolute; width: 1px;
    background: rgba(160,155,140,0.3);
    transform-origin: top center;
  }
  .balloon-bag { position: absolute; image-rendering: auto; }
  .pop-particle { position: absolute; border-radius: 50%; pointer-events: none; z-index: 101; }

  /* ── Falling bag ── */
  .falling-bag {
    position: absolute; width: 48px; height: 48px;
    pointer-events: none; z-index: 99; image-rendering: auto;
  }

  /* ── Basket ── */
  .bag-basket {
    position: fixed; bottom: 16px; right: 24px; z-index: 102;
    display: flex; flex-direction: column; align-items: center;
    pointer-events: none; opacity: 0; transition: opacity 0.6s ease;
  }
  .bag-basket.visible { opacity: 1; }
  .basket-bowl {
    width: 88px; height: 52px;
    border: 1.5px solid rgba(160,150,120,0.35); border-top: none;
    border-radius: 0 0 18px 18px; background: rgba(40,36,28,0.6);
    position: relative; overflow: hidden;
    display: flex; align-items: flex-end; justify-content: center;
    flex-wrap: wrap; padding: 4px; gap: 2px;
    transition: all 0.5s ease;
  }
  .basket-bowl.upgraded { border-color: rgba(200,170,90,0.5); box-shadow: 0 0 12px rgba(200,170,90,0.15); }
  .basket-count {
    font-family: 'Cormorant Garamond', serif;
    font-size: 10px; font-style: italic;
    color: rgba(195,175,130,0.45);
    margin-top: 4px; letter-spacing: 0.3px;
  }
  .basket-bag-icon {
    width: 14px; height: 14px; opacity: 0.7;
    animation: basketBagDrop 0.4s ease-out;
  }
  @keyframes basketBagDrop {
    0% { transform: translateY(-10px) scale(0.5); opacity: 0; }
    60% { transform: translateY(2px) scale(1.05); opacity: 0.8; }
    100% { transform: translateY(0) scale(1); opacity: 0.7; }
  }

  /* ── Collect / steal flash ── */
  .collect-flash {
    position: fixed; pointer-events: none; z-index: 103;
    font-family: 'Cormorant Garamond', serif;
    font-size: 12px; font-style: italic;
    color: rgba(195,175,130,0.6); white-space: nowrap;
    animation: collectFloat 1.2s ease-out forwards;
  }
  .steal-flash {
    position: fixed; pointer-events: none; z-index: 103;
    font-family: 'Cormorant Garamond', serif;
    font-size: 12px; font-style: italic;
    color: rgba(200,80,70,0.7); white-space: nowrap;
    animation: collectFloat 1.4s ease-out forwards;
  }
  @keyframes collectFloat {
    0% { opacity: 0.8; transform: translateY(0); }
    100% { opacity: 0; transform: translateY(-30px); }
  }

  /* ── Milestone banner ── */
  .milestone-banner {
    position: fixed; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px; font-style: italic;
    color: rgba(195,175,130,0.8);
    letter-spacing: 1px; white-space: nowrap;
    pointer-events: none; z-index: 200;
    text-align: center;
    animation: milestonePulse 2.5s ease-out forwards;
  }
  .milestone-sub {
    font-size: 11px; color: rgba(195,175,130,0.5);
    margin-top: 4px; letter-spacing: 0.5px;
  }
  @keyframes milestonePulse {
    0% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
    15% { opacity: 1; transform: translate(-50%, -50%) scale(1.05); }
    70% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    100% { opacity: 0; transform: translate(-50%, -50%) scale(1); }
  }

  /* ── Thief ── */
  .thief-unit {
    position: absolute; bottom: 0; z-index: 98;
    pointer-events: all; cursor: pointer;
    transition: filter 0.2s ease;
  }
  .thief-unit:hover { filter: brightness(1.3); }
  .thief-unit.stunned {
    filter: brightness(0.5) saturate(0.3);
    pointer-events: none;
  }
  .thief-svg { display: block; }
  .stun-stars {
    position: absolute; top: -12px; left: 50%;
    transform: translateX(-50%);
    font-size: 10px; letter-spacing: 2px;
    animation: spinStars 0.8s linear infinite;
    pointer-events: none;
  }
  @keyframes spinStars {
    0% { transform: translateX(-50%) rotate(0deg); }
    100% { transform: translateX(-50%) rotate(360deg); }
  }

  /* ── Scoreboard ── */
  .scoreboard {
    position: fixed; top: 16px; right: 24px; z-index: 200;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic; text-align: right;
    opacity: 0; transition: opacity 0.6s ease;
  }
  .scoreboard.visible { opacity: 1; }
  .score-collected { font-size: 13px; color: rgba(195,175,130,0.6); }
  .score-stolen { font-size: 11px; color: rgba(200,80,70,0.45); margin-top: 2px; }
  .score-powerup { font-size: 10px; color: rgba(130,200,170,0.5); margin-top: 4px; }

  /* ── Auto-collect radius indicator ── */
  .auto-collect-ring {
    position: fixed; border: 1px solid rgba(130,200,170,0.15);
    border-radius: 50%; pointer-events: none; z-index: 101;
    transition: opacity 0.4s ease;
  }

  /* ── Golden balloon shimmer ── */
  .balloon-hitbox.golden .balloon-svg {
    filter: drop-shadow(0 2px 8px rgba(220,190,80,0.3));
  }
  .balloon-hitbox.golden:hover .balloon-svg {
    filter: drop-shadow(0 2px 14px rgba(220,190,80,0.5));
  }
</style>
</head>
<body>

  const MILESTONES = [

    { at: 75, msg: 'S tier bags', sub: 'the thieves fear you' },
    { at: 100,msg: 'you win. your bags are eternal.', sub: 'go outside.' },
  ];

  function checkMilestones() {
    const m = MILESTONES.find(m => m.at === collected);
    if (!m) return;

    // Show banner
    const banner = document.createElement('div');
    banner.className = 'milestone-banner';
    banner.innerHTML = m.msg + (m.sub ? '<div class="milestone-sub">' + m.sub + '</div>' : '');
    document.body.appendChild(banner);
    setTimeout(() => banner.remove(), 3000);

    // Power-ups
    if (collected >= 5) stunDuration = 3500;
    if (collected >= 10 && !hasAutoCollect) {
      hasAutoCollect = true;
      autoCollectRadius = 120;
      scorePowerup.textContent = 'auto-collect active';
    }
    if (collected >= 20 && !hasGoldenBalloons) {
      hasGoldenBalloons = true;
      scorePowerup.textContent = 'golden balloons active';
    }
    if (collected >= 20) {
      basketBowl.classList.add('upgraded');
    }
  }

  function createBalloonSVG(color, size, golden) {
    const w = size, h = size * 1.2;
    const ns = 'http://www.w3.org/2000/svg';
    const svg = document.createElementNS(ns, 'svg');
    svg.setAttribute('width', w); svg.setAttribute('height', h);
    svg.setAttribute('viewBox', '0 0 40 48'); svg.classList.add('balloon-svg');

    if (golden) {
      const defs = document.createElementNS(ns, 'defs');
      const grad = document.createElementNS(ns, 'radialGradient');
      grad.setAttribute('id', 'gold' + Math.random().toString(36).substr(2,5));
      grad.setAttribute('cx', '35%'); grad.setAttribute('cy', '35%');
      const s1 = document.createElementNS(ns, 'stop');
      s1.setAttribute('offset', '0%'); s1.setAttribute('stop-color', 'rgba(255,240,150,0.7)');
      const s2 = document.createElementNS(ns, 'stop');
      s2.setAttribute('offset', '100%'); s2.setAttribute('stop-color', 'rgba(180,150,50,0.6)');
      grad.appendChild(s1); grad.appendChild(s2);
      defs.appendChild(grad); svg.appendChild(defs);

      const body = document.createElementNS(ns, 'ellipse');
      body.setAttribute('cx', '20'); body.setAttribute('cy', '18');
      body.setAttribute('rx', '15'); body.setAttribute('ry', '18');
      body.setAttribute('fill', 'url(#' + grad.getAttribute('id') + ')');
      body.setAttribute('stroke', 'rgba(255,220,100,0.3)'); body.setAttribute('stroke-width', '0.8');
      svg.appendChild(body);
    } else {
      const body = document.createElementNS(ns, 'ellipse');
      body.setAttribute('cx', '20'); body.setAttribute('cy', '18');
      body.setAttribute('rx', '15'); body.setAttribute('ry', '18');
      body.setAttribute('fill', color.body);
      body.setAttribute('stroke', 'rgba(255,255,255,0.06)'); body.setAttribute('stroke-width', '0.5');
      svg.appendChild(body);
    }

    const hl = document.createElementNS(ns, 'ellipse');
    hl.setAttribute('cx', '14'); hl.setAttribute('cy', '12');
    hl.setAttribute('rx', '5'); hl.setAttribute('ry', '7');
    hl.setAttribute('fill', golden ? 'rgba(255,250,200,0.4)' : color.hl);
    hl.setAttribute('transform', 'rotate(-15 14 12)');
    svg.appendChild(hl);

    const knot = document.createElementNS(ns, 'polygon');
    knot.setAttribute('points', '18,36 22,36 20,40');
    knot.setAttribute('fill', golden ? 'rgba(180,150,50,0.6)' : color.body);
    svg.appendChild(knot);

    return svg;
  }

  function spawnBalloon() {
    if (activeBalloons.length >= MAX_ACTIVE) return;
    const isGolden = hasGoldenBalloons && Math.random() < 0.15;
    const color = isGolden ? GOLDEN_COLOR : BALLOON_COLORS[Math.floor(Math.random() * BALLOON_COLORS.length)];
    const fromLeft = Math.random() > 0.5;
    const startX = fromLeft ? -80 : window.innerWidth + 80;
    const startY = window.innerHeight * (0.1 + Math.random() * 0.55);
    const speed = 0.35 + Math.random() * 0.75;
    const dir = fromLeft ? 1 : -1;

    const unit = document.createElement('div');
    unit.className = 'balloon-unit';
    const hitbox = document.createElement('div');
    hitbox.className = 'balloon-hitbox' + (isGolden ? ' golden' : '');
    hitbox.style.width = BALLOON_SIZE + 'px';
    hitbox.style.height = (BALLOON_SIZE * 1.2) + 'px';
    const svg = createBalloonSVG(color, BALLOON_SIZE, isGolden);
    hitbox.appendChild(svg); unit.appendChild(hitbox);

    const string = document.createElement('div');
    string.className = 'balloon-string';
    string.style.height = STRING_LEN + 'px';
    string.style.left = (BALLOON_SIZE / 2) + 'px';
    string.style.top = (BALLOON_SIZE * 1.2) + 'px';
    unit.appendChild(string);

    const bag = document.createElement('img');
    bag.className = 'balloon-bag';
    bag.src = BAG_IMG;
    bag.style.width = BAG_SIZE + 'px'; bag.style.height = BAG_SIZE + 'px';
    bag.style.left = ((BALLOON_SIZE - BAG_SIZE) / 2) + 'px';
    bag.style.top = (BALLOON_SIZE * 1.2 + STRING_LEN - 4) + 'px';
    unit.appendChild(bag);
    document.body.appendChild(unit);

    const data = {
      el: unit, hitbox: hitbox,
      x: startX, y: startY, speed: speed, dir: dir,
      wobbleAmp: 8 + Math.random() * 12,
      wobbleFreq: 0.008 + Math.random() * 0.008,
      wobblePhase: Math.random() * Math.PI * 2,
      tick: 0, color: color, popped: false,
      golden: isGolden, value: isGolden ? 3 : 1
    };
    hitbox.addEventListener('click', function(e) { e.stopPropagation(); popBalloon(data); });
    activeBalloons.push(data);
  }

  function popBalloon(b) {
    if (b.popped) return;
    b.popped = true;
    const rect = b.hitbox.getBoundingClientRect();
    const cx = rect.left + rect.width / 2, cy = rect.top + rect.height / 2;

    for (let i = 0; i < (b.golden ? 12 : 8); i++) {
      const p = document.createElement('div');
      p.className = 'pop-particle';
      const size = 3 + Math.random() * 5;
      const angle = (Math.PI * 2 / 8) * i + Math.random() * 0.4;
      const dist = 20 + Math.random() * 30;
      p.style.width = size + 'px'; p.style.height = size + 'px';
      p.style.left = cx + 'px'; p.style.top = cy + 'px';
      p.style.background = b.color.pop + (0.4 + Math.random() * 0.3) + ')';
      p.style.transition = 'all 0.5s ease-out'; p.style.opacity = '1';
      document.body.appendChild(p);
      requestAnimationFrame(() => {
        p.style.transform = 'translate(' + Math.cos(angle)*dist + 'px,' + Math.sin(angle)*dist + 'px) scale(0.2)';
        p.style.opacity = '0';
      });
      setTimeout(() => p.remove(), 600);
    }

    const bagRect = b.el.querySelector('.balloon-bag').getBoundingClientRect();
    const fb = document.createElement('img');
    fb.className = 'falling-bag';
    fb.src = BAG_IMG;
    fb.style.left = bagRect.left + 'px'; fb.style.top = bagRect.top + 'px';
    document.body.appendChild(fb);
    fallingBags.push({
      el: fb, x: bagRect.left, y: bagRect.top,
      vx: b.dir * b.speed * 0.5, vy: 0,
      rotation: 0, rotSpeed: (Math.random() - 0.5) * 4,
      bounces: 0, value: b.value
    });
    b.el.remove();
  }

  // ══════════════════════
  //  THIEF SYSTEM
  // ══════════════════════
  let thiefTypeIndex = 0;

  function spawnThief() {
    const type = THIEF_TYPES[thiefTypeIndex % THIEF_TYPES.length];
    thiefTypeIndex++;
    const thiefSize = 36;
    const fromLeft = Math.random() > 0.5;
    const startX = fromLeft ? -50 : window.innerWidth + 50;

    const unit = document.createElement('div');
    unit.className = 'thief-unit';
    unit.style.left = startX + 'px';
    const svg = type.createSVG(thiefSize);
    if (!fromLeft) svg.style.transform = 'scaleX(-1)';
    unit.appendChild(svg);
    document.body.appendChild(unit);

    const data = {
      el: unit, type: type,
      x: startX, dir: fromLeft ? 1 : -1,
      speed: type.speed, stunned: false, stunTimer: 0,
      targetBag: null, carrying: null, fleeing: false
    };

    unit.addEventListener('click', function(e) {
      e.stopPropagation();
      stunThief(data);
    });

    activeThieves.push(data);
  }

  function stunThief(t) {
    if (t.stunned) return;
    t.stunned = true;
    t.stunTimer = stunDuration;
    t.el.classList.add('stunned');

    // If carrying a bag, drop it
    if (t.carrying) {
      const fb = document.createElement('img');
      fb.className = 'falling-bag';
      fb.src = BAG_IMG;
      fb.style.left = t.x + 'px';
      fb.style.top = (window.innerHeight - 60) + 'px';
      document.body.appendChild(fb);
      fallingBags.push({
        el: fb, x: t.x, y: window.innerHeight - 60,
        vx: 0, vy: -3, rotation: 0, rotSpeed: (Math.random()-0.5)*3,
        bounces: 0, value: t.carrying.value || 1
      });
      t.carrying = null;
      t.fleeing = false;
    }

    // Stars
    const stars = document.createElement('div');
    stars.className = 'stun-stars';
    stars.textContent = '\u2729 \u2729 \u2729';
    t.el.appendChild(stars);
    setTimeout(() => {
      t.stunned = false;
      t.el.classList.remove('stunned');
      if (stars.parentNode) stars.remove();
    }, stunDuration);
  }

  function stealBag(thief, fb) {
    stolen++;
    fb.el.remove();
    thief.carrying = { value: fb.value || 1 };
    thief.fleeing = true;
    thief.dir = thief.x < window.innerWidth / 2 ? -1 : 1;

    // Steal flash
    const flash = document.createElement('div');
    flash.className = 'steal-flash';
    flash.textContent = thief.type.stealMsg;
    flash.style.left = thief.x + 'px';
    flash.style.bottom = '60px';
    document.body.appendChild(flash);
    setTimeout(() => flash.remove(), 1500);

    updateScoreboard();
  }

  // ══════════════════════
  //  COLLECT + SCORE
  // ══════════════════════
  function collectBag(fb) {
    const val = fb.value || 1;
    collected += val;
    fb.el.remove();

    if (collected >= 1) {
      basketEl.classList.add('visible');
      scoreboard.classList.add('visible');
    }

    for (let v = 0; v < val; v++) {
      const icon = document.createElement('img');
      icon.className = 'basket-bag-icon'; icon.src = BAG_IMG;
      basketBowl.appendChild(icon);
    }

    const flash = document.createElement('div');
    flash.className = 'collect-flash';
    flash.textContent = val > 1 ? '+' + val + ' bags!' : '+1 bag';
    flash.style.right = '48px'; flash.style.bottom = '68px';
    document.body.appendChild(flash);
    setTimeout(() => flash.remove(), 1300);

    updateScoreboard();
    checkMilestones();
  }

  function updateScoreboard() {
    scoreCollected.textContent = collected + ' bags collected';
    scoreStolen.textContent = stolen > 0 ? stolen + ' stolen' : '';
  }

  // ══════════════════════
  //  MAIN LOOP
  // ══════════════════════
  function tick() {
    const W = window.innerWidth, H = window.innerHeight;
    const basketRect = basketBowl.getBoundingClientRect();
    const basketCX = basketRect.left + basketRect.width / 2;
    const basketCY = basketRect.top + basketRect.height / 2;

    // ── Balloons ──
    for (let i = activeBalloons.length - 1; i >= 0; i--) {
      const b = activeBalloons[i];
      if (b.popped) { activeBalloons.splice(i, 1); continue; }
      b.tick++;
      b.x += b.speed * b.dir;
      const wy = Math.sin(b.tick * b.wobbleFreq + b.wobblePhase) * b.wobbleAmp;
      b.el.style.transform = 'translate(' + b.x + 'px,' + (b.y + wy) + 'px)';
      if ((b.dir > 0 && b.x > W + 100) || (b.dir < 0 && b.x < -100)) {
        b.el.remove(); activeBalloons.splice(i, 1);
      }
    }

    // ── Falling bags ──
    for (let i = fallingBags.length - 1; i >= 0; i--) {
      const fb = fallingBags[i];
      fb.vy += GRAVITY;
      fb.x += fb.vx; fb.y += fb.vy;
      fb.rotation += fb.rotSpeed;
      fb.el.style.left = fb.x + 'px';
      fb.el.style.top = fb.y + 'px';
      fb.el.style.transform = 'rotate(' + fb.rotation + 'deg)';

      if (fb.y + BAG_SIZE >= H - 10) {
        fb.y = H - 10 - BAG_SIZE;
        fb.vy = -Math.abs(fb.vy) * BOUNCE_DAMPEN;
        fb.vx *= 0.7; fb.rotSpeed *= 0.6; fb.bounces++;
      }

      // Auto-collect radius
      if (hasAutoCollect) {
        const dx = (fb.x + BAG_SIZE/2) - basketCX;
        const dy = (fb.y + BAG_SIZE/2) - basketCY;
        if (Math.sqrt(dx*dx + dy*dy) < autoCollectRadius) {
          collectBag(fb); fallingBags.splice(i, 1); continue;
        }
      }

      // Basket collision
      const bagCX = fb.x + BAG_SIZE / 2, bagCY = fb.y + BAG_SIZE / 2;
      if (bagCX >= basketRect.left - 20 && bagCX <= basketRect.right + 20 &&
          bagCY >= basketRect.top - 20 && bagCY <= basketRect.bottom + 10) {
        collectBag(fb); fallingBags.splice(i, 1); continue;
      }

      // Settle → slide to basket
      if (fb.bounces >= 2 && Math.abs(fb.vy) < 2) {
        const tx = basketRect.left + basketRect.width/2 - BAG_SIZE/2;
        const ty = basketRect.top;
        fb.x += (tx - fb.x) * 0.04; fb.y += (ty - fb.y) * 0.04;
        fb.rotation *= 0.95;
        if (Math.abs(fb.x - tx) < 5 && Math.abs(fb.y - ty) < 10) {
          collectBag(fb); fallingBags.splice(i, 1); continue;
        }
      }

      if (fb.y > H + 200 || fb.x < -200 || fb.x > W + 200) {
        fb.el.remove(); fallingBags.splice(i, 1);
      }
    }

    // ── Thieves ──
    for (let i = activeThieves.length - 1; i >= 0; i--) {
      const t = activeThieves[i];
      if (t.stunned) continue;

      if (t.fleeing) {
        // Run away with the bag
        t.x += t.dir * (t.speed + 1.5);
        t.el.style.left = t.x + 'px';
        if (t.x < -80 || t.x > W + 80) {
          t.el.remove(); activeThieves.splice(i, 1);
        }
        continue;
      }

      // Find nearest grounded bag
      let nearest = null, nearDist = Infinity;
      for (let j = 0; j < fallingBags.length; j++) {
        const fb = fallingBags[j];
        if (fb.bounces < 1) continue; // only go after landed bags
        const dist = Math.abs(fb.x - t.x);
        if (dist < nearDist) { nearDist = dist; nearest = fb; }
      }

      if (nearest && nearDist < 300) {
        // Chase the bag
        const bagDir = nearest.x > t.x ? 1 : -1;
        t.x += bagDir * t.speed;
        t.el.style.left = t.x + 'px';

        // Close enough to grab?
        if (Math.abs(t.x - nearest.x) < 20) {
          const idx = fallingBags.indexOf(nearest);
          if (idx !== -1) {
            stealBag(t, nearest);
            fallingBags.splice(idx, 1);
          }
        }
      } else {
        // Patrol
        t.x += t.dir * t.speed * 0.4;
        t.el.style.left = t.x + 'px';
        if (t.x < -60 || t.x > W + 60) {
          // Turn around if no bags and wandered off
          if (!nearest) t.dir *= -1;
        }
      }

      // Remove if way off screen while not fleeing
      if (t.x < -150 || t.x > W + 150) {
        t.el.remove(); activeThieves.splice(i, 1);
      }
    }

    requestAnimationFrame(tick);
  }

  // ── Spawn timers ──
  function scheduleBalloon() {
    const delay = spawnMin + Math.random() * (spawnMax - spawnMin);
    setTimeout(() => { spawnBalloon(); scheduleBalloon(); }, delay);
  }

  function scheduleThief() {
    const delay = thiefSpawnMin + Math.random() * (thiefSpawnMax - thiefSpawnMin);
    setTimeout(() => {
      if (collected >= 1 || fallingBags.length > 0) spawnThief();
      scheduleThief();
    }, delay);
  }

  // ── Init ──
  tick();
  setTimeout(spawnBalloon, 600);
  setTimeout(spawnBalloon, 1400);
  setTimeout(spawnBalloon, 2200);
  setTimeout(spawnBalloon, 3000);
  setTimeout(spawnBalloon, 4000);
  scheduleBalloon();
  // First thief appears after ~10s
  setTimeout(() => { spawnThief(); scheduleThief(); }, 10000);

})();
</script>
