<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>shame</title>
<style>
  html, body {
    margin: 0; padding: 0; height: 100%; width: 100%;
    overflow: hidden; background: #1a0d0d;
    color: #e8d8c8;
    font-family: 'EB Garamond', Georgia, 'Times New Roman', serif;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center; gap: 28px;
  }
  .shame-gif {
    max-width: 70vw;
    max-height: 55vh;
    box-shadow: 0 20px 60px rgba(0,0,0,0.8);
    border: 1px solid rgba(232,216,200,0.15);
  }
  .shame-text {
    font-size: clamp(44px, 10vw, 120px);
    letter-spacing: 0.08em;
    color: #e8d8c8;
    font-style: italic;
    text-shadow: 0 0 20px rgba(232,216,200,0.35);
    animation: shame-pulse 1.8s ease-in-out infinite;
    margin: 0;
  }
  .shame-sub {
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 12px;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: rgba(232,216,200,0.35);
    margin: 0;
  }
  @keyframes shame-pulse {
    0%, 100% { opacity: 0.82; transform: scale(1); }
    50%      { opacity: 1;    transform: scale(1.03); }
  }
  /* vignette */
  body::before {
    content: ""; position: fixed; inset: 0;
    pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.7) 100%);
    z-index: 100;
  }
</style>
</head>
<body>
  <img class="shame-gif"
       src="bagslady/shame-gameofthrones.gif"
       alt=""
       onerror="this.style.display='none'"/>
  <h1 class="shame-text">SHAME. SHAME. SHAME.</h1>

  <script>
    // Voice removed per user feedback — it didn't sound right.
    // Page is now purely visual: gif + the "SHAME. SHAME. SHAME." text tolling
    // via the shame-pulse CSS animation.
  </script>
</body>
</html>
