<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Last Orders — ACK Arcade</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0c;
    color: #e0ddd5;
    font-family: 'JetBrains Mono', monospace;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    user-select: none;
    -webkit-user-select: none;
  }

  canvas {
    display: block;
    width: 100vw;
    height: 100vh;
    image-rendering: -webkit-optimize-contrast;
  }

  /* ── Title / Menu Screen ── */
  #menu-screen {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    background: #0a0a0c;
    transition: opacity 0.6s ease;
  }
  #menu-screen.hidden { opacity: 0; pointer-events: none; }

  .menu-title {
    font-size: 2.8rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    color: rgba(220,150,50,0.9);
    text-transform: uppercase;
    margin-bottom: 8px;
    text-shadow: 0 0 30px rgba(220,150,50,0.3);
  }
  .menu-subtitle {
    font-size: 0.7rem;
    color: rgba(200,190,170,0.4);
    letter-spacing: 0.2em;
    margin-bottom: 50px;
  }
  .menu-start {
    font-size: 0.9rem;
    color: rgba(220,150,50,0.7);
    letter-spacing: 0.15em;
    cursor: pointer;
    padding: 14px 40px;
    border: 1px solid rgba(220,150,50,0.3);
    border-radius: 4px;
    transition: all 0.3s ease;
    background: transparent;
    font-family: inherit;
  }
  .menu-start:hover {
    background: rgba(220,150,50,0.1);
    border-color: rgba(220,150,50,0.6);
    color: rgba(220,150,50,1);
  }
  .menu-highscore {
    margin-top: 30px;
    font-size: 0.55rem;
    color: rgba(200,190,170,0.3);
    letter-spacing: 0.12em;
  }
  .menu-faces {
    display: flex;
    gap: 18px;
    margin-bottom: 40px;
  }
  .menu-faces img {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    object-fit: cover;
    opacity: 0.6;
    filter: saturate(0.8);
    transition: all 0.3s ease;
  }
  .menu-faces img:hover {
    opacity: 1;
    filter: saturate(1.2);
    transform: scale(1.15) rotate(-5deg);
  }

  /* ── HUD ── */
  #hud {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 50px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    z-index: 50;
    pointer-events: none;
    background: linear-gradient(to bottom, rgba(10,10,12,0.8), transparent);
  }
  #hud.hidden { display: none; }
  .hud-score {
    font-size: 0.7rem;
    color: rgba(220,150,50,0.8);
    letter-spacing: 0.1em;
  }
  .hud-combo {
    font-size: 0.6rem;
    color: rgba(50,205,50,0.7);
    letter-spacing: 0.08em;
    transition: all 0.2s ease;
  }
  .hud-combo.fire { color: rgba(255,100,50,0.9); font-size: 0.75rem; }
  .hud-lives {
    font-size: 0.65rem;
    color: rgba(200,60,60,0.7);
    letter-spacing: 0.08em;
  }

  /* ── Game Over ── */
  #gameover-screen {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    background: rgba(10,10,12,0.92);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.5s ease;
  }
  #gameover-screen.visible { opacity: 1; pointer-events: auto; }

  .go-title {
    font-size: 2rem;
    font-weight: 700;
    color: rgba(200,60,60,0.9);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .go-score {
    font-size: 1.1rem;
    color: rgba(220,150,50,0.8);
    letter-spacing: 0.1em;
    margin-bottom: 8px;
  }
  .go-best {
    font-size: 0.6rem;
    color: rgba(200,190,170,0.4);
    letter-spacing: 0.1em;
    margin-bottom: 40px;
  }
  .go-retry {
    font-size: 0.8rem;
    color: rgba(220,150,50,0.7);
    letter-spacing: 0.12em;
    cursor: pointer;
    padding: 12px 36px;
    border: 1px solid rgba(220,150,50,0.3);
    border-radius: 4px;
    transition: all 0.3s ease;
    background: transparent;
    font-family: inherit;
  }
  .go-retry:hover {
    background: rgba(220,150,50,0.1);
    border-color: rgba(220,150,50,0.6);
  }

  /* ── Drink queue (bottom) ── */
  #drink-queue {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 12px;
    z-index: 50;
    pointer-events: auto;
  }
  #drink-queue.hidden { display: none; }

  .drink-btn {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    border: 2px solid rgba(220,150,50,0.3);
    background: rgba(20,18,22,0.85);
    cursor: pointer;
    transition: all 0.15s ease;
    overflow: hidden;
    position: relative;
  }
  .drink-btn:hover {
    border-color: rgba(220,150,50,0.7);
    transform: scale(1.1);
  }
  .drink-btn:active {
    transform: scale(0.95);
    border-color: rgba(50,205,50,0.8);
  }
  .drink-btn img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    pointer-events: none;
  }
  .drink-btn .drink-key {
    position: absolute;
    bottom: -2px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.4rem;
    color: rgba(200,190,170,0.35);
    letter-spacing: 0.06em;
    background: rgba(10,10,12,0.7);
    padding: 1px 5px;
    border-radius: 2px;
  }

  /* ── Floating score popup ── */
  .score-popup {
    position: fixed;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
    font-weight: 700;
    pointer-events: none;
    z-index: 80;
    animation: scoreFloat 0.8s ease-out forwards;
  }
  @keyframes scoreFloat {
    0% { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-40px) scale(1.3); }
  }

  /* ── Back button ── */
  #back-btn {
    position: fixed;
    top: 14px;
    left: 14px;
    z-index: 200;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.5rem;
    color: rgba(200,190,170,0.3);
    letter-spacing: 0.08em;
    cursor: pointer;
    padding: 4px 10px;
    border: 1px solid rgba(200,190,170,0.12);
    border-radius: 3px;
    background: transparent;
    transition: all 0.3s ease;
  }
  #back-btn:hover {
    color: rgba(200,190,170,0.6);
    border-color: rgba(200,190,170,0.3);
  }
</style>
</head>
<body>

<!-- ── Canvas for bar background + animations ── -->
<canvas id="game-canvas"></canvas>

<!-- ── Menu Screen ── -->
<div id="menu-screen">
  <div class="menu-title">Last Orders</div>
  <div class="menu-subtitle">A.C.K.  ARCADE</div>
  <div class="menu-faces">
    <img src="../lastorders/web/label_greentap.png" alt="green">
    <img src="../lastorders/web/label3.png" alt="purple">
    <img src="../lastorders/web/label5.png" alt="blue">
    <img src="../lastorders/web/label6.png" alt="pink">
    <img src="../lastorders/web/label_donithing.png" alt="donithing">
  </div>
  <button class="menu-start" id="start-btn">SERVE DRINKS</button>
  <div class="menu-highscore" id="menu-highscore"></div>
</div>

<!-- ── HUD ── -->
<div id="hud" class="hidden">
  <span class="hud-score" id="hud-score">SCORE: 0</span>
  <span class="hud-combo" id="hud-combo"></span>
  <span class="hud-lives" id="hud-lives"></span>
</div>

<!-- ── Drink Queue (tap buttons) ── -->
<div id="drink-queue" class="hidden"></div>

<!-- ── Game Over ── -->
<div id="gameover-screen">
  <div class="go-title">BAR'S CLOSED</div>
  <div class="go-score" id="go-score">0</div>
  <div class="go-best" id="go-best"></div>
  <button class="go-retry" id="retry-btn">ONE MORE ROUND</button>
</div>

<!-- ── Back to gallery ── -->
<button id="back-btn" onclick="window.parent.postMessage({type:'arcade-exit'},'*'); if(window.opener) window.close(); else history.back();">← GALLERY</button>

<script>
(function() {
  'use strict';

  // ── Asset paths ──
  const FACE_IMGS = [
    '../lastorders/web/label_greentap.png',
    '../lastorders/web/label3.png',
    '../lastorders/web/label5.png',
    '../lastorders/web/label6.png',
    '../lastorders/web/label_donithing.png'
  ];
  const FACE_NAMES = ['Green Tap', 'Purple Skull', 'Blue Ghoul', 'Pink Creep', 'Donithing'];
  const FACE_COLORS = [
    'rgba(80,200,80,0.8)',   // green
    'rgba(180,60,220,0.8)',  // purple
    'rgba(60,140,220,0.8)',  // blue
    'rgba(220,80,160,0.8)',  // pink
    'rgba(120,200,80,0.8)'   // donithing green
  ];
  const BAR_IMG_SRC = '../lastorders/web/lastorders_still.jpg';

  // ── Game state ──
  let gameState = 'menu'; // menu | playing | gameover
  let score = 0;
  let combo = 0;
  let maxCombo = 0;
  let lives = 3;
  let highScore = 0;
  let level = 1;
  let spawnTimer = 0;
  let spawnInterval = 2800; // ms between spawns — decreases with level
  let lastTime = 0;
  let customers = []; // active customers on bar
  let slidingDrinks = []; // drinks sliding across bar
  let particles = []; // visual fx
  let shakeAmount = 0;

  // ── Lane system — 4 lanes (bar positions from left to right) ──
  const NUM_LANES = 4;

  // ── DOM refs ──
  const canvas = document.getElementById('game-canvas');
  const ctx = canvas.getContext('2d');
  const menuScreen = document.getElementById('menu-screen');
  const hudEl = document.getElementById('hud');
  const hudScore = document.getElementById('hud-score');
  const hudCombo = document.getElementById('hud-combo');
  const hudLives = document.getElementById('hud-lives');
  const drinkQueue = document.getElementById('drink-queue');
  const goScreen = document.getElementById('gameover-screen');
  const goScore = document.getElementById('go-score');
  const goBest = document.getElementById('go-best');
  const menuHS = document.getElementById('menu-highscore');

  // ── Preload images ──
  const faceImages = [];
  let barImage = null;
  let imagesLoaded = 0;
  const totalImages = FACE_IMGS.length + 1;

  function preloadImages(cb) {
    FACE_IMGS.forEach((src, i) => {
      const img = new Image();
      img.onload = () => { imagesLoaded++; if (imagesLoaded >= totalImages) cb(); };
      img.onerror = () => { imagesLoaded++; if (imagesLoaded >= totalImages) cb(); };
      img.src = src;
      faceImages[i] = img;
    });
    barImage = new Image();
    barImage.onload = () => { imagesLoaded++; if (imagesLoaded >= totalImages) cb(); };
    barImage.onerror = () => { imagesLoaded++; if (imagesLoaded >= totalImages) cb(); };
    barImage.src = BAR_IMG_SRC;
  }

  // ── Canvas sizing ──
  function resizeCanvas() {
    canvas.width = window.innerWidth * window.devicePixelRatio;
    canvas.height = window.innerHeight * window.devicePixelRatio;
    ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
  }
  window.addEventListener('resize', resizeCanvas);

  // ── Helpers ──
  function W() { return window.innerWidth; }
  function H() { return window.innerHeight; }

  function laneX(lane) {
    // Spread lanes across the bar area (center 70% of screen)
    const barLeft = W() * 0.15;
    const barRight = W() * 0.85;
    const laneW = (barRight - barLeft) / NUM_LANES;
    return barLeft + laneW * lane + laneW / 2;
  }

  function barY() {
    // Customer positions — upper portion of bar
    return H() * 0.32;
  }

  function barSlideY() {
    // Where drinks slide — bar counter surface
    return H() * 0.58;
  }

  // ── Build drink buttons ──
  function buildDrinkButtons() {
    drinkQueue.innerHTML = '';
    const keys = ['1', '2', '3', '4', '5'];
    FACE_IMGS.forEach((src, i) => {
      const btn = document.createElement('div');
      btn.className = 'drink-btn';
      btn.innerHTML = '<img src="' + src + '" alt="' + FACE_NAMES[i] + '">' +
        '<span class="drink-key">' + keys[i] + '</span>';
      btn.addEventListener('click', () => serveDrink(i));
      btn.addEventListener('touchstart', (e) => { e.preventDefault(); serveDrink(i); });
      drinkQueue.appendChild(btn);
    });
  }

  // ── Keyboard controls ──
  document.addEventListener('keydown', (e) => {
    if (gameState === 'menu') {
      if (e.key === 'Enter' || e.key === ' ') startGame();
      return;
    }
    if (gameState === 'gameover') {
      if (e.key === 'Enter' || e.key === ' ') startGame();
      return;
    }
    if (gameState === 'playing') {
      const idx = parseInt(e.key) - 1;
      if (idx >= 0 && idx < 5) serveDrink(idx);
    }
  });

  // ── Serve a drink ──
  function serveDrink(drinkType) {
    if (gameState !== 'playing') return;

    // Find the nearest matching customer (closest to "rage out")
    let bestCustomer = null;
    let bestUrgency = -1;
    customers.forEach(c => {
      if (c.type === drinkType && !c.served && c.patience < c.maxPatience) {
        const urgency = 1 - (c.patience / c.maxPatience);
        if (urgency > bestUrgency) {
          bestUrgency = urgency;
          bestCustomer = c;
        }
      }
    });

    if (bestCustomer) {
      // Correct serve! Launch drink toward customer
      slidingDrinks.push({
        type: drinkType,
        x: W() / 2,
        y: barSlideY(),
        targetX: bestCustomer.x,
        targetY: bestCustomer.y + 30,
        speed: 12,
        customer: bestCustomer,
        size: 38
      });
      bestCustomer.served = true;

      // Score
      combo++;
      if (combo > maxCombo) maxCombo = combo;
      const comboMult = Math.min(combo, 10);
      const pts = 10 * comboMult;
      score += pts;

      // Floating score
      showScorePopup(bestCustomer.x, bestCustomer.y - 20, '+' + pts, FACE_COLORS[drinkType]);

      // Particles
      spawnParticles(bestCustomer.x, bestCustomer.y, FACE_COLORS[drinkType], 8);

    } else {
      // Wrong drink! No matching customer
      combo = 0;
      shakeAmount = 6;
      showScorePopup(W() / 2, barSlideY() - 20, 'MISS', 'rgba(200,60,60,0.8)');
    }

    updateHUD();
  }

  // ── Spawn a customer ──
  function spawnCustomer() {
    // Pick a random lane that isn't occupied
    const occupiedLanes = customers.filter(c => !c.leaving).map(c => c.lane);
    const freeLanes = [];
    for (let i = 0; i < NUM_LANES; i++) {
      if (!occupiedLanes.includes(i)) freeLanes.push(i);
    }
    if (freeLanes.length === 0) return; // all lanes full

    const lane = freeLanes[Math.floor(Math.random() * freeLanes.length)];
    const type = Math.floor(Math.random() * 5);

    // Patience decreases with level
    const basePat = 5000;
    const levelReduction = Math.min(level * 200, 3000);
    const maxPatience = basePat - levelReduction + Math.random() * 800;

    customers.push({
      type: type,
      lane: lane,
      x: laneX(lane),
      y: barY(),
      maxPatience: maxPatience,
      patience: maxPatience,
      served: false,
      leaving: false,
      leaveTimer: 0,
      enterAnim: 1.0, // 1 = just arrived, animates to 0
      size: 55,
      bobPhase: Math.random() * Math.PI * 2
    });
  }

  // ── Lose a life ──
  function loseLife(customer) {
    lives--;
    combo = 0;
    shakeAmount = 12;
    spawnParticles(customer.x, customer.y, 'rgba(200,60,60,0.7)', 12);
    showScorePopup(customer.x, customer.y - 30, 'RAGE!', 'rgba(200,60,60,0.9)');
    updateHUD();

    if (lives <= 0) {
      endGame();
    }
  }

  // ── Update HUD ──
  function updateHUD() {
    hudScore.textContent = 'SCORE: ' + score;
    if (combo >= 3) {
      hudCombo.textContent = combo + 'x COMBO';
      hudCombo.className = combo >= 8 ? 'hud-combo fire' : 'hud-combo';
    } else {
      hudCombo.textContent = '';
    }
    // Lives as skulls
    let livesStr = '';
    for (let i = 0; i < 3; i++) {
      livesStr += i < lives ? '☠ ' : '  ';
    }
    hudLives.textContent = livesStr;
  }

  // ── Score popup ──
  function showScorePopup(x, y, text, color) {
    const el = document.createElement('div');
    el.className = 'score-popup';
    el.textContent = text;
    el.style.left = x + 'px';
    el.style.top = y + 'px';
    el.style.color = color;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 800);
  }

  // ── Particles ──
  function spawnParticles(x, y, color, count) {
    for (let i = 0; i < count; i++) {
      particles.push({
        x: x,
        y: y,
        vx: (Math.random() - 0.5) * 6,
        vy: (Math.random() - 0.5) * 6 - 2,
        life: 1.0,
        decay: 0.015 + Math.random() * 0.02,
        size: 2 + Math.random() * 4,
        color: color
      });
    }
  }

  // ── Game loop ──
  function gameLoop(time) {
    if (!lastTime) lastTime = time;
    const dt = Math.min(time - lastTime, 50); // cap delta
    lastTime = time;

    // Clear
    ctx.clearRect(0, 0, W(), H());

    // Shake
    if (shakeAmount > 0) {
      ctx.save();
      ctx.translate(
        (Math.random() - 0.5) * shakeAmount,
        (Math.random() - 0.5) * shakeAmount
      );
      shakeAmount *= 0.9;
      if (shakeAmount < 0.5) shakeAmount = 0;
    }

    // Draw bar background
    drawBar();

    if (gameState === 'playing') {
      // Spawn timer
      spawnTimer += dt;
      if (spawnTimer >= spawnInterval) {
        spawnTimer = 0;
        spawnCustomer();
        // Level up every 5 customers
        level = Math.floor(score / 80) + 1;
        spawnInterval = Math.max(800, 2800 - level * 150);
      }

      // Update customers
      updateCustomers(dt);

      // Update sliding drinks
      updateDrinks(dt);
    }

    // Draw customers
    drawCustomers();

    // Draw sliding drinks
    drawDrinks();

    // Draw particles
    updateParticles(dt);
    drawParticles();

    // Draw bar counter overlay (front of bar)
    drawBarFront();

    if (shakeAmount > 0) ctx.restore();

    requestAnimationFrame(gameLoop);
  }

  // ── Draw bar background ──
  function drawBar() {
    if (barImage && barImage.complete) {
      // Draw the bar image covering the full canvas, darkened
      const imgAr = barImage.width / barImage.height;
      const canAr = W() / H();
      let dw, dh, dx, dy;
      if (canAr > imgAr) {
        dw = W();
        dh = W() / imgAr;
        dx = 0;
        dy = (H() - dh) / 2;
      } else {
        dh = H();
        dw = H() * imgAr;
        dy = 0;
        dx = (W() - dw) / 2;
      }
      ctx.globalAlpha = 0.35;
      ctx.drawImage(barImage, dx, dy, dw, dh);
      ctx.globalAlpha = 1.0;
    }

    // Dark overlay for readability
    ctx.fillStyle = 'rgba(10,10,12,0.55)';
    ctx.fillRect(0, 0, W(), H());

    // Bar counter line
    const bsY = barSlideY() + 15;
    ctx.strokeStyle = 'rgba(220,150,50,0.15)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(W() * 0.1, bsY);
    ctx.lineTo(W() * 0.9, bsY);
    ctx.stroke();

    // Lane dividers (subtle)
    ctx.strokeStyle = 'rgba(200,190,170,0.04)';
    ctx.lineWidth = 1;
    for (let i = 0; i < NUM_LANES; i++) {
      const x = laneX(i);
      ctx.beginPath();
      ctx.moveTo(x, barY() - 40);
      ctx.lineTo(x, barSlideY() + 10);
      ctx.stroke();
    }
  }

  function drawBarFront() {
    // Subtle bar edge glow
    const bsY = barSlideY() + 15;
    const grad = ctx.createLinearGradient(0, bsY, 0, bsY + 40);
    grad.addColorStop(0, 'rgba(220,150,50,0.06)');
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.fillRect(W() * 0.1, bsY, W() * 0.8, 40);
  }

  // ── Update & draw customers ──
  function updateCustomers(dt) {
    for (let i = customers.length - 1; i >= 0; i--) {
      const c = customers[i];

      // Enter animation
      if (c.enterAnim > 0) {
        c.enterAnim -= dt * 0.003;
        if (c.enterAnim < 0) c.enterAnim = 0;
      }

      // Leaving animation
      if (c.leaving) {
        c.leaveTimer += dt;
        if (c.leaveTimer > 400) {
          customers.splice(i, 1);
        }
        continue;
      }

      // Patience countdown
      if (!c.served) {
        c.patience -= dt;
        if (c.patience <= 0) {
          // Customer raged out!
          c.leaving = true;
          c.leaveTimer = 0;
          loseLife(c);
        }
      }

      // Bob
      c.bobPhase += dt * 0.003;
    }
  }

  function drawCustomers() {
    customers.forEach(c => {
      const img = faceImages[c.type];
      if (!img) return;

      let alpha = 1.0;
      let scale = 1.0;
      let yOff = 0;

      // Enter animation
      if (c.enterAnim > 0) {
        alpha = 1 - c.enterAnim;
        scale = 0.5 + 0.5 * (1 - c.enterAnim);
        yOff = c.enterAnim * 30;
      }

      // Leaving animation
      if (c.leaving) {
        const t = c.leaveTimer / 400;
        alpha = 1 - t;
        scale = 1 + t * 0.3;
        yOff = -t * 20;
      }

      // Urgency — pulse when patience is low
      const urgency = c.served ? 0 : 1 - (c.patience / c.maxPatience);
      if (urgency > 0.6 && !c.leaving) {
        const pulse = Math.sin(Date.now() * 0.01) * 0.1;
        scale += pulse;
      }

      // Bob
      yOff += Math.sin(c.bobPhase) * 3;

      const s = c.size * scale;
      const cx = c.x;
      const cy = c.y + yOff;

      ctx.save();
      ctx.globalAlpha = alpha;

      // Patience ring
      if (!c.served && !c.leaving) {
        const ringR = s / 2 + 6;
        const startAngle = -Math.PI / 2;
        const endAngle = startAngle + (2 * Math.PI * (c.patience / c.maxPatience));

        // Background ring
        ctx.strokeStyle = 'rgba(60,55,50,0.3)';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(cx, cy, ringR, 0, Math.PI * 2);
        ctx.stroke();

        // Patience ring — color shifts from green to red
        const r = Math.round(200 * urgency + 50 * (1 - urgency));
        const g = Math.round(60 * urgency + 200 * (1 - urgency));
        ctx.strokeStyle = 'rgba(' + r + ',' + g + ',50,' + (0.6 + urgency * 0.3) + ')';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(cx, cy, ringR, startAngle, endAngle);
        ctx.stroke();
      }

      // Glow behind face when served
      if (c.served && !c.leaving) {
        ctx.shadowColor = FACE_COLORS[c.type];
        ctx.shadowBlur = 20;
      }

      // Draw face
      ctx.beginPath();
      ctx.arc(cx, cy, s / 2, 0, Math.PI * 2);
      ctx.closePath();
      ctx.save();
      ctx.clip();
      ctx.drawImage(img, cx - s / 2, cy - s / 2, s, s);
      ctx.restore();

      ctx.shadowBlur = 0;

      // Name label
      if (!c.leaving) {
        ctx.fillStyle = 'rgba(200,190,170,' + (0.35 * alpha) + ')';
        ctx.font = '0.4rem "JetBrains Mono"';
        ctx.textAlign = 'center';
        ctx.fillText(FACE_NAMES[c.type], cx, cy + s / 2 + 16);
      }

      ctx.restore();
    });
  }

  // ── Update & draw sliding drinks ──
  function updateDrinks(dt) {
    for (let i = slidingDrinks.length - 1; i >= 0; i--) {
      const d = slidingDrinks[i];
      const dx = d.targetX - d.x;
      const dy = d.targetY - d.y;
      const dist = Math.sqrt(dx * dx + dy * dy);

      if (dist < 10) {
        // Reached customer — mark as leaving
        if (d.customer) {
          d.customer.leaving = true;
          d.customer.leaveTimer = 0;
        }
        spawnParticles(d.x, d.y, FACE_COLORS[d.type], 6);
        slidingDrinks.splice(i, 1);
        continue;
      }

      const speed = d.speed * (dt / 16);
      d.x += (dx / dist) * speed;
      d.y += (dy / dist) * speed;
    }
  }

  function drawDrinks() {
    slidingDrinks.forEach(d => {
      const img = faceImages[d.type];
      if (!img) return;

      ctx.save();
      ctx.globalAlpha = 0.85;

      // Trail glow
      ctx.shadowColor = FACE_COLORS[d.type];
      ctx.shadowBlur = 15;

      ctx.beginPath();
      ctx.arc(d.x, d.y, d.size / 2, 0, Math.PI * 2);
      ctx.closePath();
      ctx.save();
      ctx.clip();
      ctx.drawImage(img, d.x - d.size / 2, d.y - d.size / 2, d.size, d.size);
      ctx.restore();

      ctx.shadowBlur = 0;
      ctx.restore();
    });
  }

  // ── Particles ──
  function updateParticles(dt) {
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.1; // gravity
      p.life -= p.decay;
      if (p.life <= 0) particles.splice(i, 1);
    }
  }

  function drawParticles() {
    particles.forEach(p => {
      ctx.globalAlpha = p.life;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;
  }

  // ── Start game ──
  function startGame() {
    gameState = 'playing';
    score = 0;
    combo = 0;
    maxCombo = 0;
    lives = 3;
    level = 1;
    spawnTimer = 0;
    spawnInterval = 2800;
    customers = [];
    slidingDrinks = [];
    particles = [];
    shakeAmount = 0;

    menuScreen.classList.add('hidden');
    goScreen.classList.remove('visible');
    hudEl.classList.remove('hidden');
    drinkQueue.classList.remove('hidden');

    updateHUD();

    // Spawn first customer quickly
    setTimeout(() => spawnCustomer(), 500);
  }

  // ── End game ──
  function endGame() {
    gameState = 'gameover';
    hudEl.classList.add('hidden');
    drinkQueue.classList.add('hidden');

    if (score > highScore) highScore = score;

    goScore.textContent = 'SCORE: ' + score;
    goBest.textContent = 'BEST: ' + highScore + (maxCombo > 2 ? '  ·  MAX COMBO: ' + maxCombo + 'x' : '');

    setTimeout(() => {
      goScreen.classList.add('visible');
    }, 600);
  }

  // ── Init ──
  function init() {
    resizeCanvas();
    buildDrinkButtons();

    // Menu high score
    if (highScore > 0) {
      menuHS.textContent = 'BEST: ' + highScore;
    }

    // Start button
    document.getElementById('start-btn').addEventListener('click', startGame);
    document.getElementById('retry-btn').addEventListener('click', startGame);

    // Start render loop
    requestAnimationFrame(gameLoop);
  }

  // Preload then init
  preloadImages(init);

})();
</script>
</body>
</html>
