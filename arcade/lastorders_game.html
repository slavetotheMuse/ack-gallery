<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Last Orders — ACK Arcade</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0c;
    color: #e0ddd5;
    font-family: 'JetBrains Mono', monospace;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    user-select: none;
    -webkit-user-select: none;
    touch-action: manipulation;
  }

  canvas { display: block; }

  /* ── Menu ── */
  #menu {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 100; background: #0a0a0c;
    transition: opacity 0.5s ease;
  }
  #menu.hidden { opacity: 0; pointer-events: none; }
  .m-title {
    font-size: 2.6rem; font-weight: 700;
    letter-spacing: 0.15em; color: rgba(220,150,50,0.9);
    text-transform: uppercase; margin-bottom: 6px;
    text-shadow: 0 0 40px rgba(220,150,50,0.25);
  }
  .m-sub {
    font-size: 0.6rem; color: rgba(200,190,170,0.35);
    letter-spacing: 0.2em; margin-bottom: 40px;
  }
  .m-faces {
    display: flex; gap: 16px; margin-bottom: 36px;
  }
  .m-faces img {
    width: 50px; height: 50px; border-radius: 50%;
    object-fit: cover; opacity: 0.55; filter: saturate(0.7);
    transition: all 0.3s ease;
  }
  .m-faces img:hover {
    opacity: 1; filter: saturate(1.2);
    transform: scale(1.2) rotate(-8deg);
  }
  .m-btn {
    font-family: inherit; font-size: 0.85rem;
    color: rgba(220,150,50,0.75); letter-spacing: 0.14em;
    cursor: pointer; padding: 13px 38px;
    border: 1px solid rgba(220,150,50,0.3);
    border-radius: 4px; background: transparent;
    transition: all 0.25s ease;
  }
  .m-btn:hover {
    background: rgba(220,150,50,0.1);
    border-color: rgba(220,150,50,0.6);
    color: rgba(220,150,50,1);
  }
  .m-hs {
    margin-top: 28px; font-size: 0.5rem;
    color: rgba(200,190,170,0.25); letter-spacing: 0.1em;
  }
  .m-hint {
    margin-top: 14px; font-size: 0.42rem;
    color: rgba(200,190,170,0.18); letter-spacing: 0.08em;
  }

  /* ── HUD ── */
  #hud {
    position: fixed; top: 0; left: 0; right: 0;
    height: 44px; display: flex;
    align-items: center; justify-content: space-between;
    padding: 0 22px; z-index: 50; pointer-events: none;
    background: linear-gradient(to bottom, rgba(10,10,12,0.7), transparent);
  }
  #hud.hidden { display: none; }
  .h-score { font-size: 0.65rem; color: rgba(220,150,50,0.8); letter-spacing: 0.1em; }
  .h-combo { font-size: 0.55rem; color: rgba(50,205,50,0.7); letter-spacing: 0.08em; }
  .h-combo.fire { color: rgba(255,100,50,0.9); font-size: 0.7rem; }
  .h-lives { font-size: 0.6rem; color: rgba(200,60,60,0.7); letter-spacing: 0.08em; }
  .h-level { font-size: 0.45rem; color: rgba(200,190,170,0.3); letter-spacing: 0.08em; }

  /* ── Game Over ── */
  #gameover {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 100; background: rgba(10,10,12,0.92);
    opacity: 0; pointer-events: none;
    transition: opacity 0.5s ease;
  }
  #gameover.visible { opacity: 1; pointer-events: auto; }
  .go-title {
    font-size: 1.8rem; font-weight: 700;
    color: rgba(200,60,60,0.9); letter-spacing: 0.12em;
    text-transform: uppercase; margin-bottom: 10px;
  }
  .go-score { font-size: 1rem; color: rgba(220,150,50,0.8); letter-spacing: 0.1em; margin-bottom: 6px; }
  .go-detail { font-size: 0.5rem; color: rgba(200,190,170,0.35); letter-spacing: 0.08em; margin-bottom: 35px; }

  /* ── Score popup ── */
  .sp {
    position: fixed; font-family: 'JetBrains Mono', monospace;
    font-size: 0.85rem; font-weight: 700;
    pointer-events: none; z-index: 80;
    animation: spFloat 0.7s ease-out forwards;
  }
  @keyframes spFloat {
    0% { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-35px) scale(1.2); }
  }

  /* ── Back button ── */
  #back {
    position: fixed; top: 12px; left: 12px; z-index: 200;
    font-family: inherit; font-size: 0.45rem;
    color: rgba(200,190,170,0.25); letter-spacing: 0.06em;
    cursor: pointer; padding: 3px 8px;
    border: 1px solid rgba(200,190,170,0.1);
    border-radius: 3px; background: transparent;
  }
  #back:hover { color: rgba(200,190,170,0.5); border-color: rgba(200,190,170,0.25); }
</style>
</head>
<body>

<canvas id="c"></canvas>

<div id="menu">
  <div class="m-title">Last Orders</div>
  <div class="m-sub">A.C.K.  ARCADE</div>
  <div class="m-faces">
    <img src="../lastorders/web/label_greentap.png" alt="">
    <img src="../lastorders/web/label3.png" alt="">
    <img src="../lastorders/web/label5.png" alt="">
    <img src="../lastorders/web/label6.png" alt="">
    <img src="../lastorders/web/label_donithing.png" alt="">
  </div>
  <button class="m-btn" id="start-btn">POP 'EM</button>
  <div class="m-hs" id="m-hs"></div>
  <div class="m-hint">click / tap the faces before they escape</div>
</div>

<div id="hud" class="hidden">
  <span class="h-score" id="h-score">0</span>
  <span class="h-level" id="h-level"></span>
  <span class="h-combo" id="h-combo"></span>
  <span class="h-lives" id="h-lives"></span>
</div>

<div id="gameover">
  <div class="go-title">BAR'S CLOSED</div>
  <div class="go-score" id="go-score">0</div>
  <div class="go-detail" id="go-detail"></div>
  <button class="m-btn" id="retry-btn">ONE MORE ROUND</button>
</div>

<button id="back" onclick="window.parent.postMessage({type:'arcade-exit'},'*');if(window.opener)window.close();else history.back();">← GALLERY</button>

<script>
(function() {
  'use strict';

  // ── Assets ──
  const FACES = [
    { src: '../lastorders/web/label_greentap.png', name: 'Green Tap', color: [80,200,80], pts: 10 },
    { src: '../lastorders/web/label3.png',         name: 'Purple Skull', color: [180,60,220], pts: 10 },
    { src: '../lastorders/web/label5.png',          name: 'Blue Ghoul', color: [60,140,220], pts: 10 },
    { src: '../lastorders/web/label6.png',          name: 'Pink Creep', color: [220,80,160], pts: 15 },
    { src: '../lastorders/web/label_donithing.png', name: 'Donithing', color: [120,200,80], pts: 20 }
  ];

  // ── Preload ──
  const faceImgs = [];
  let loaded = 0;
  FACES.forEach((f, i) => {
    const img = new Image();
    img.onload = img.onerror = () => { loaded++; if (loaded >= FACES.length) init(); };
    img.src = f.src;
    faceImgs[i] = img;
  });

  // ── Canvas ──
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;

  function resize() {
    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', resize);
  resize();

  function W() { return window.innerWidth; }
  function H() { return window.innerHeight; }

  // ── State ──
  let state = 'menu';
  let score = 0, combo = 0, maxCombo = 0, lives = 3, level = 1;
  let highScore = 0, totalPops = 0;
  let bubbles = [];     // active face bubbles
  let particles = [];   // pop fx
  let shelfBottles = []; // decorative shelf bottles
  let spawnTimer = 0;
  let spawnRate = 1800; // ms
  let elapsed = 0;
  let shake = 0;
  let lastT = 0;

  // ── DOM ──
  const menuEl = document.getElementById('menu');
  const hudEl = document.getElementById('hud');
  const hScore = document.getElementById('h-score');
  const hCombo = document.getElementById('h-combo');
  const hLives = document.getElementById('h-lives');
  const hLevel = document.getElementById('h-level');
  const goEl = document.getElementById('gameover');
  const goScore = document.getElementById('go-score');
  const goDetail = document.getElementById('go-detail');
  const mHs = document.getElementById('m-hs');

  // ── SVG Bar Drawing ──
  function drawBar() {
    const w = W(), h = H();

    // Back wall — dark gradient
    const wallGrad = ctx.createLinearGradient(0, 0, 0, h);
    wallGrad.addColorStop(0, '#0d0c10');
    wallGrad.addColorStop(0.5, '#121118');
    wallGrad.addColorStop(1, '#0a090d');
    ctx.fillStyle = wallGrad;
    ctx.fillRect(0, 0, w, h);

    // Shelves — 3 horizontal shelves on back wall
    const shelfColor = 'rgba(60,50,40,0.35)';
    const shelfEdge = 'rgba(90,75,55,0.25)';
    for (let si = 0; si < 3; si++) {
      const sy = h * 0.12 + si * (h * 0.14);
      const sx = w * 0.08;
      const sw = w * 0.84;
      const sh = 4;

      // Shelf surface
      ctx.fillStyle = shelfColor;
      ctx.fillRect(sx, sy, sw, sh);
      // Shelf edge highlight
      ctx.fillStyle = shelfEdge;
      ctx.fillRect(sx, sy, sw, 1);

      // Shelf brackets
      for (let bi = 0; bi < 6; bi++) {
        const bx = sx + sw * (bi + 0.5) / 6;
        ctx.strokeStyle = 'rgba(80,65,45,0.15)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(bx, sy + sh);
        ctx.lineTo(bx, sy + sh + 10);
        ctx.stroke();
      }
    }

    // Bottles on shelves (decorative, static)
    if (shelfBottles.length === 0) generateShelfBottles();
    shelfBottles.forEach(b => {
      ctx.globalAlpha = b.alpha;
      ctx.fillStyle = b.color;
      // Bottle body
      const bx = b.x, by = b.y;
      ctx.beginPath();
      ctx.roundRect(bx - b.bw/2, by - b.bh, b.bw, b.bh, [2,2,0,0]);
      ctx.fill();
      // Bottle neck
      ctx.fillRect(bx - b.bw * 0.25, by - b.bh - b.neck, b.bw * 0.5, b.neck);
      // Label stripe
      ctx.fillStyle = b.labelColor;
      ctx.fillRect(bx - b.bw/2 + 1, by - b.bh * 0.55, b.bw - 2, b.bh * 0.22);
      // Cap
      ctx.fillStyle = b.capColor;
      ctx.fillRect(bx - b.bw * 0.3, by - b.bh - b.neck - 3, b.bw * 0.6, 3);
      ctx.globalAlpha = 1;
    });

    // Neon sign — "LAST ORDERS" glow
    const signY = h * 0.06;
    ctx.textAlign = 'center';
    ctx.font = '700 ' + Math.max(12, w * 0.018) + 'px "JetBrains Mono"';
    // Glow layers
    ctx.shadowColor = 'rgba(255,50,80,0.4)';
    ctx.shadowBlur = 20;
    ctx.fillStyle = 'rgba(255,50,80,0.6)';
    ctx.fillText('LAST ORDERS', w / 2, signY);
    ctx.shadowBlur = 8;
    ctx.fillStyle = 'rgba(255,80,100,0.85)';
    ctx.fillText('LAST ORDERS', w / 2, signY);
    ctx.shadowBlur = 0;

    // Bar counter — thick horizontal bar in lower third
    const barY = h * 0.65;
    const barH = h * 0.06;

    // Counter top surface
    const cGrad = ctx.createLinearGradient(0, barY, 0, barY + barH);
    cGrad.addColorStop(0, 'rgba(55,42,30,0.9)');
    cGrad.addColorStop(0.3, 'rgba(70,55,38,0.85)');
    cGrad.addColorStop(1, 'rgba(40,30,22,0.9)');
    ctx.fillStyle = cGrad;
    ctx.fillRect(0, barY, w, barH);

    // Counter edge highlight
    ctx.fillStyle = 'rgba(120,95,60,0.25)';
    ctx.fillRect(0, barY, w, 1.5);

    // Bar front panel (below counter)
    const fpGrad = ctx.createLinearGradient(0, barY + barH, 0, h);
    fpGrad.addColorStop(0, 'rgba(30,24,18,0.95)');
    fpGrad.addColorStop(1, 'rgba(18,14,10,0.98)');
    ctx.fillStyle = fpGrad;
    ctx.fillRect(0, barY + barH, w, h - barY - barH);

    // Panel trim lines
    ctx.strokeStyle = 'rgba(80,65,45,0.12)';
    ctx.lineWidth = 1;
    for (let pi = 0; pi < 5; pi++) {
      const px = w * (pi + 0.5) / 5;
      ctx.beginPath();
      ctx.moveTo(px, barY + barH + 8);
      ctx.lineTo(px, h - 10);
      ctx.stroke();
    }

    // Tap handles on bar
    for (let ti = 0; ti < 4; ti++) {
      const tx = w * 0.25 + ti * (w * 0.16);
      const tapH = 28 + Math.sin(ti * 2.3) * 5;
      // Handle base
      ctx.fillStyle = 'rgba(90,70,45,0.5)';
      ctx.fillRect(tx - 3, barY - 8, 6, 8);
      // Handle
      ctx.fillStyle = ti % 2 === 0 ? 'rgba(200,160,80,0.4)' : 'rgba(180,180,190,0.35)';
      ctx.beginPath();
      ctx.roundRect(tx - 4, barY - 8 - tapH, 8, tapH, [3,3,0,0]);
      ctx.fill();
      // Tap ball top
      ctx.beginPath();
      ctx.arc(tx, barY - 8 - tapH - 4, 5, 0, Math.PI * 2);
      ctx.fill();
    }

    // Subtle ambient light from above
    const ambGrad = ctx.createRadialGradient(w/2, 0, 0, w/2, 0, h * 0.7);
    ambGrad.addColorStop(0, 'rgba(220,150,50,0.03)');
    ambGrad.addColorStop(1, 'transparent');
    ctx.fillStyle = ambGrad;
    ctx.fillRect(0, 0, w, h);

    // Spot lights (warm pools of light)
    for (let li = 0; li < 3; li++) {
      const lx = w * (0.25 + li * 0.25);
      const spotGrad = ctx.createRadialGradient(lx, 0, 0, lx, 0, h * 0.5);
      spotGrad.addColorStop(0, 'rgba(255,200,100,0.02)');
      spotGrad.addColorStop(1, 'transparent');
      ctx.fillStyle = spotGrad;
      ctx.fillRect(lx - h * 0.5, 0, h, h * 0.5);
    }
  }

  function generateShelfBottles() {
    shelfBottles = [];
    const w = W(), h = H();
    const bottleColors = [
      'rgba(40,80,40,0.6)', 'rgba(60,30,20,0.6)', 'rgba(30,50,70,0.6)',
      'rgba(80,60,30,0.5)', 'rgba(50,20,50,0.5)', 'rgba(70,70,40,0.5)',
      'rgba(25,60,55,0.6)', 'rgba(80,30,30,0.55)'
    ];
    const labelColors = [
      'rgba(200,180,140,0.2)', 'rgba(180,160,120,0.15)', 'rgba(220,200,160,0.18)',
      'rgba(160,180,160,0.15)', 'rgba(200,160,180,0.15)'
    ];
    const capColors = [
      'rgba(180,160,80,0.4)', 'rgba(200,200,210,0.35)', 'rgba(140,100,60,0.4)'
    ];

    for (let si = 0; si < 3; si++) {
      const sy = h * 0.12 + si * (h * 0.14);
      const sx = w * 0.1;
      const sw = w * 0.8;
      const numBottles = 8 + Math.floor(Math.random() * 5);

      for (let bi = 0; bi < numBottles; bi++) {
        const bx = sx + (bi + 0.5) * (sw / numBottles) + (Math.random() - 0.5) * 8;
        const bw = 8 + Math.random() * 6;
        const bh = 18 + Math.random() * 14;
        shelfBottles.push({
          x: bx, y: sy,
          bw: bw, bh: bh,
          neck: 5 + Math.random() * 6,
          color: bottleColors[Math.floor(Math.random() * bottleColors.length)],
          labelColor: labelColors[Math.floor(Math.random() * labelColors.length)],
          capColor: capColors[Math.floor(Math.random() * capColors.length)],
          alpha: 0.4 + Math.random() * 0.3
        });
      }
    }
  }

  // ── Bubble (face to pop) ──
  function spawnBubble() {
    const w = W(), h = H();
    const type = Math.floor(Math.random() * FACES.length);
    const barTop = h * 0.65; // bar counter Y

    // Spawn zone: above the bar, in the shelf area
    const minY = h * 0.08;
    const maxY = barTop - 50;
    const minX = w * 0.08;
    const maxX = w * 0.92;

    // Size varies by level — smaller = harder
    const baseSize = Math.max(36, 60 - level * 1.5);
    const size = baseSize + Math.random() * 16;

    // Lifetime decreases with level
    const baseLife = 3200;
    const life = Math.max(1200, baseLife - level * 120 + Math.random() * 600);

    // Random starting position
    const x = minX + Math.random() * (maxX - minX);
    const y = maxY - Math.random() * (maxY - minY) * 0.7;

    bubbles.push({
      type: type,
      x: x, y: y,
      size: size,
      maxLife: life,
      life: life,
      phase: Math.random() * Math.PI * 2,   // bob
      driftX: (Math.random() - 0.5) * 0.4,  // slow horizontal drift
      driftY: -0.15 - Math.random() * 0.2,  // slow upward float
      popAnim: 0,  // 0 = alive, >0 = popping
      popped: false,
      enterScale: 0 // grows in from 0
    });
  }

  // ── Click / tap handler ──
  canvas.addEventListener('click', handleTap);
  canvas.addEventListener('touchstart', function(e) {
    e.preventDefault();
    const t = e.touches[0];
    handleTap({ clientX: t.clientX, clientY: t.clientY });
  }, { passive: false });

  function handleTap(e) {
    if (state !== 'playing') return;

    const mx = e.clientX;
    const my = e.clientY;
    let hit = false;

    // Check from top (most recent) to bottom so overlapping favors front
    for (let i = bubbles.length - 1; i >= 0; i--) {
      const b = bubbles[i];
      if (b.popped) continue;
      const dx = mx - b.x;
      const dy = my - b.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const hitR = b.size / 2 * Math.max(0.3, b.enterScale);

      if (dist < hitR + 8) { // small grace area
        popBubble(b);
        hit = true;
        break;
      }
    }

    if (!hit) {
      // Missed tap — break combo
      if (combo > 0) {
        combo = 0;
        showPopup(mx, my, 'MISS', 'rgba(150,130,110,0.5)');
      }
    }

    updateHUD();
  }

  function popBubble(b) {
    b.popped = true;
    b.popAnim = 1;
    totalPops++;

    combo++;
    if (combo > maxCombo) maxCombo = combo;
    const mult = Math.min(combo, 12);
    const pts = FACES[b.type].pts * mult;
    score += pts;

    const fc = FACES[b.type].color;
    const colStr = 'rgba(' + fc[0] + ',' + fc[1] + ',' + fc[2] + ',0.85)';

    showPopup(b.x, b.y - b.size / 2 - 5, '+' + pts, colStr);
    spawnPop(b.x, b.y, fc, 12 + Math.min(combo, 8));

    // Level up
    level = Math.floor(score / 100) + 1;
    spawnRate = Math.max(500, 1800 - level * 80);
  }

  // ── Missed bubble (escaped) ──
  function missedBubble(b) {
    lives--;
    combo = 0;
    shake = 10;
    const fc = FACES[b.type].color;
    showPopup(b.x, b.y, 'ESCAPED!', 'rgba(200,60,60,0.8)');
    spawnPop(b.x, b.y, [200, 60, 60], 6);
    updateHUD();
    if (lives <= 0) endGame();
  }

  // ── Particles ──
  function spawnPop(x, y, rgb, count) {
    for (let i = 0; i < count; i++) {
      const angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.5;
      const speed = 2 + Math.random() * 5;
      particles.push({
        x: x, y: y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed - 1,
        life: 1, decay: 0.018 + Math.random() * 0.015,
        size: 2 + Math.random() * 4,
        r: rgb[0], g: rgb[1], b: rgb[2]
      });
    }
  }

  function showPopup(x, y, text, color) {
    const el = document.createElement('div');
    el.className = 'sp';
    el.textContent = text;
    el.style.left = x + 'px';
    el.style.top = y + 'px';
    el.style.color = color;
    el.style.transform = 'translateX(-50%)';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 700);
  }

  // ── HUD ──
  function updateHUD() {
    hScore.textContent = 'SCORE: ' + score;
    hLevel.textContent = 'ROUND ' + level;
    if (combo >= 3) {
      hCombo.textContent = combo + 'x';
      hCombo.className = combo >= 8 ? 'h-combo fire' : 'h-combo';
    } else {
      hCombo.textContent = '';
    }
    let lStr = '';
    for (let i = 0; i < 3; i++) lStr += i < lives ? '☠ ' : '· ';
    hLives.textContent = lStr;
  }

  // ── Game flow ──
  function startGame() {
    state = 'playing';
    score = 0; combo = 0; maxCombo = 0;
    lives = 3; level = 1; totalPops = 0;
    spawnTimer = 0; spawnRate = 1800; elapsed = 0;
    bubbles = []; particles = []; shake = 0;
    shelfBottles = [];

    menuEl.classList.add('hidden');
    goEl.classList.remove('visible');
    hudEl.classList.remove('hidden');
    updateHUD();

    setTimeout(() => spawnBubble(), 400);
    setTimeout(() => spawnBubble(), 900);
  }

  function endGame() {
    state = 'gameover';
    hudEl.classList.add('hidden');
    if (score > highScore) highScore = score;
    goScore.textContent = 'SCORE: ' + score;
    goDetail.textContent = 'POPPED: ' + totalPops + '  ·  BEST COMBO: ' + maxCombo + 'x  ·  HIGH: ' + highScore;
    setTimeout(() => goEl.classList.add('visible'), 500);
  }

  // Buttons
  document.getElementById('start-btn').addEventListener('click', startGame);
  document.getElementById('retry-btn').addEventListener('click', startGame);
  document.addEventListener('keydown', e => {
    if ((e.key === 'Enter' || e.key === ' ') && state !== 'playing') startGame();
  });

  // ── Main loop ──
  function loop(t) {
    if (!lastT) lastT = t;
    const dt = Math.min(t - lastT, 50);
    lastT = t;

    ctx.clearRect(0, 0, W(), H());

    // Shake
    if (shake > 0) {
      ctx.save();
      ctx.translate((Math.random() - 0.5) * shake, (Math.random() - 0.5) * shake);
      shake *= 0.88;
      if (shake < 0.4) shake = 0;
    }

    // Bar background
    drawBar();

    if (state === 'playing') {
      elapsed += dt;
      spawnTimer += dt;

      // Spawn
      if (spawnTimer >= spawnRate) {
        spawnTimer = 0;
        spawnBubble();
        // Chance of double spawn at higher levels
        if (level >= 3 && Math.random() < 0.3) {
          setTimeout(() => { if (state === 'playing') spawnBubble(); }, 200 + Math.random() * 300);
        }
        if (level >= 6 && Math.random() < 0.2) {
          setTimeout(() => { if (state === 'playing') spawnBubble(); }, 400 + Math.random() * 300);
        }
      }

      // Update bubbles
      for (let i = bubbles.length - 1; i >= 0; i--) {
        const b = bubbles[i];

        // Enter animation
        if (b.enterScale < 1) {
          b.enterScale += dt * 0.005;
          if (b.enterScale > 1) b.enterScale = 1;
        }

        if (b.popped) {
          b.popAnim -= dt * 0.004;
          if (b.popAnim <= 0) { bubbles.splice(i, 1); continue; }
        } else {
          // Float and drift
          b.phase += dt * 0.002;
          b.x += b.driftX;
          b.y += b.driftY;
          b.x += Math.sin(b.phase) * 0.3;
          b.y += Math.cos(b.phase * 0.7) * 0.2;

          // Patience countdown
          b.life -= dt;
          if (b.life <= 0) {
            missedBubble(b);
            bubbles.splice(i, 1);
            continue;
          }

          // Keep in bounds
          const pad = b.size;
          if (b.x < pad) b.driftX = Math.abs(b.driftX);
          if (b.x > W() - pad) b.driftX = -Math.abs(b.driftX);
          if (b.y < pad) b.driftY = Math.abs(b.driftY) * 0.5;
        }
      }
    }

    // Draw bubbles
    bubbles.forEach(b => {
      const img = faceImgs[b.type];
      if (!img) return;

      let alpha = 1, scale = b.enterScale;
      const fc = FACES[b.type].color;

      if (b.popped) {
        alpha = b.popAnim;
        scale = 1 + (1 - b.popAnim) * 0.6;
      } else {
        // Urgency — flash when time is low
        const urgency = 1 - (b.life / b.maxLife);
        if (urgency > 0.65) {
          const flash = Math.sin(Date.now() * 0.012) * 0.15;
          scale += flash;
          // Warning ring color shifts
        }
      }

      const s = b.size * scale;

      ctx.save();
      ctx.globalAlpha = alpha;

      // Glow behind bubble
      const glowR = s * 0.7;
      const glow = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, glowR);
      glow.addColorStop(0, 'rgba(' + fc[0] + ',' + fc[1] + ',' + fc[2] + ',0.12)');
      glow.addColorStop(1, 'transparent');
      ctx.fillStyle = glow;
      ctx.fillRect(b.x - glowR, b.y - glowR, glowR * 2, glowR * 2);

      // Patience ring (if alive)
      if (!b.popped) {
        const ringR = s / 2 + 5;
        const pct = b.life / b.maxLife;
        const startA = -Math.PI / 2;
        const endA = startA + Math.PI * 2 * pct;

        // Background ring
        ctx.strokeStyle = 'rgba(60,55,50,0.2)';
        ctx.lineWidth = 2.5;
        ctx.beginPath();
        ctx.arc(b.x, b.y, ringR, 0, Math.PI * 2);
        ctx.stroke();

        // Patience arc
        const urgency = 1 - pct;
        const rr = Math.round(200 * urgency + fc[0] * 0.3 * (1 - urgency));
        const gg = Math.round(60 * urgency + fc[1] * 0.3 * (1 - urgency));
        const bb = Math.round(50 + fc[2] * 0.2 * (1 - urgency));
        ctx.strokeStyle = 'rgba(' + rr + ',' + gg + ',' + bb + ',' + (0.5 + urgency * 0.4) + ')';
        ctx.lineWidth = 2.5;
        ctx.beginPath();
        ctx.arc(b.x, b.y, ringR, startA, endA);
        ctx.stroke();
      }

      // Face circle
      ctx.beginPath();
      ctx.arc(b.x, b.y, s / 2, 0, Math.PI * 2);
      ctx.closePath();
      ctx.save();
      ctx.clip();
      ctx.drawImage(img, b.x - s / 2, b.y - s / 2, s, s);
      ctx.restore();

      // Border ring
      ctx.strokeStyle = 'rgba(' + fc[0] + ',' + fc[1] + ',' + fc[2] + ',' + (0.3 * alpha) + ')';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.arc(b.x, b.y, s / 2, 0, Math.PI * 2);
      ctx.stroke();

      ctx.restore();
    });

    // Particles
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.12;
      p.life -= p.decay;
      if (p.life <= 0) { particles.splice(i, 1); continue; }

      ctx.globalAlpha = p.life;
      ctx.fillStyle = 'rgba(' + p.r + ',' + p.g + ',' + p.b + ',0.8)';
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    if (shake > 0) ctx.restore();

    requestAnimationFrame(loop);
  }

  // ── Init ──
  function init() {
    if (highScore > 0) mHs.textContent = 'BEST: ' + highScore;
    requestAnimationFrame(loop);
  }

})();
</script>
</body>
</html>
